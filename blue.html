<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galesky | AntuanSV</title>
    <style>
        :root {
            --bg: #000;
            --accent: #1da1f2;
            --text-main: #fff;
            --text-dim: #aaa;
            --card-bg: #111;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* HEADER RESTAURADO */
        .header { 
            padding: 40px 20px; 
            border-bottom: 1px solid #222; 
            max-width: 900px; 
            margin: auto; 
        }
        
        .search { display: flex; margin-bottom: 30px; }
        .search input {
            flex: 1; padding: 15px 20px; background: #111; border: 2px solid #333;
            color: #fff; border-radius: 30px 0 0 30px; outline: none; font-size: 16px;
        }
        .search button {
            padding: 0 30px; border: none; background: #fff;
            border-radius: 0 30px 30px 0; cursor: pointer; font-weight: bold;
        }

        .profile { display: flex; gap: 25px; align-items: center; }
        .profile img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #222; }
        .profile-info h2 { margin: 0; font-size: 28px; }
        .profile-info p { color: var(--text-dim); margin: 8px 0; line-height: 1.4; }
        .img-count { color: var(--accent); font-weight: bold; font-size: 14px; }

        /* GRID - VOLVEMOS A LAS 3 COLUMNAS */
        .grid {
            max-width: 1000px; margin: 20px auto; 
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px; padding: 4px;
        }
        .card { aspect-ratio: 1/1; overflow: hidden; background: #111; cursor: pointer; }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* LIGHTBOX PROFESIONAL */
        .lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; z-index: 9999;
        }
        .lightbox.active { display: flex; }

        /* CONTROLES SUPERIORES */
        .lb-nav-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: #000;
        }
        .close-x { font-size: 35px; cursor: pointer; line-height: 1; }
        .btn-link { 
            color: #fff; text-decoration: none; background: var(--accent); 
            padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px;
        }

        /* CUERPO DEL LIGHTBOX */
        .lb-body { 
            flex: 1; display: flex; overflow: hidden; position: relative; 
        }
        
        .lb-img-box {
            flex: 2; display: flex; align-items: center; justify-content: center;
            padding: 10px; background: #000;
        }
        .lb-img-box img { 
            max-width: 100%; max-height: 100%; object-fit: contain; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .lb-aside {
            flex: 1; background: #111; padding: 30px; display: flex;
            flex-direction: column; border-left: 1px solid #222; overflow-y: auto;
        }
        .lb-text { font-size: 18px; line-height: 1.6; margin-bottom: 20px; }
        .lb-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid #222; }

        /* BOTONES LATERALES NAVEGACIÓN */
        .side-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.05); border: none; color: #fff;
            padding: 30px 15px; cursor: pointer; font-size: 30px; transition: 0.3s;
            z-index: 10;
        }
        .side-nav:hover { background: rgba(255,255,255,0.15); }
        .prev-btn { left: 0; border-radius: 0 10px 10px 0; }
        .next-btn { right: 0; border-radius: 10px 0 0 10px; }

        /* MÓVIL */
        @media (max-width: 768px) {
            .header { padding: 20px; }
            .profile { flex-direction: column; text-align: center; gap: 15px; }
            .profile img { width: 80px; height: 80px; }
            .profile-info h2 { font-size: 22px; }
            
            .grid { grid-template-columns: repeat(3, 1fr); gap: 2px; }

            .lb-body { flex-direction: column; }
            .lb-img-box { flex: 0 0 65%; padding: 0; } /* Asegura que la imagen tenga espacio */
            .lb-aside { flex: 1; border-left: none; border-top: 1px solid #222; padding: 20px; }
            
            .side-nav { padding: 15px 10px; background: rgba(0,0,0,0.5); top: 32%; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="search">
        <input id="userInput" placeholder="usuario.bsky.social">
        <button id="goBtn">Buscar</button>
    </div>
    <div id="profile" class="profile"></div>
</div>

<div id="gallery" class="grid"></div>

<div id="lightbox" class="lightbox">
    <div class="lb-nav-top">
        <a id="bskyLink" class="btn-link" target="_blank">Ver en Bluesky</a>
        <div class="close-x" id="closeBtn">✕</div>
    </div>
    
    <div class="lb-body">
        <button class="side-nav prev-btn" id="prevBtn">❮</button>
        
        <div class="lb-img-box">
            <img id="lbImg">
        </div>
        
        <button class="side-nav next-btn" id="nextBtn">❯</button>

        <div class="lb-aside">
            <div id="lbText" class="lb-text"></div>
            <div class="lb-footer" id="lbStats"></div>
        </div>
    </div>
</div>

<script>
const DEFAULT_USER = "iasuarezv.com";
let allImages = [];
let currentIndex = 0;

const input = document.getElementById("userInput");
const btn = document.getElementById("goBtn");
const gallery = document.getElementById("gallery");
const profile = document.getElementById("profile");
const lightbox = document.getElementById("lightbox");
const lbImg = document.getElementById("lbImg");
const lbText = document.getElementById("lbText");
const lbStats = document.getElementById("lbStats");
const bskyLink = document.getElementById("bskyLink");

const saved = localStorage.getItem("user") || DEFAULT_USER;
input.value = saved;
load(saved);

btn.onclick = () => {
    const user = input.value.trim().replace("@","");
    if(user) {
        localStorage.setItem("user", user);
        load(user);
    }
};

async function load(handle) {
    try {
        gallery.innerHTML = "<p>Cargando galería...</p>";
        allImages = [];

        const didRes = await fetch(`https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${handle}`);
        const { did } = await didRes.json();
        
        const profRes = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${did}`);
        const prof = await profRes.json();

        const feedRes = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${did}&limit=100`);
        const data = await feedRes.json();

        data.feed.forEach(item => {
            const post = item.post;
            const text = post.record?.text || "";
            const likes = post.likeCount || 0;
            const rkey = post.uri.split('/').pop();
            const link = `https://bsky.app/profile/${handle}/post/${rkey}`;

            let imgs = [];
            // 🔥 BUSQUEDA PROFUNDA PARA EVITAR IMÁGENES ROTAS
            if (post.embed?.images) imgs.push(...post.embed.images);
            if (post.embed?.media?.images) imgs.push(...post.embed.media.images);
            if (post.record?.embed?.images) imgs.push(...post.record.embed.images);
            // Casos de Quote Posts o Reposts complejos
            if (post.embed?.record?.embed?.images) imgs.push(...post.embed.record.embed.images);
            if (post.embed?.record?.record?.embed?.images) imgs.push(...post.embed.record.record.embed.images);

            imgs.forEach(img => {
                const cid = img.image?.ref?.$link || img.image?.$link;
                if (cid) {
                    allImages.push({
                        thumb: `https://cdn.bsky.app/img/feed_thumbnail/plain/${did}/${cid}@jpeg`,
                        full: `https://cdn.bsky.app/img/feed_fullsize/plain/${did}/${cid}@jpeg`,
                        text, likes, link
                    });
                }
            });
        });

        profile.innerHTML = `
            <img src="${prof.avatar || ''}">
            <div class="profile-info">
                <h2>${prof.displayName || handle}</h2>
                <p>${prof.description || ""}</p>
                <div class="img-count">📸 ${allImages.length} imágenes</div>
            </div>
        `;

        renderGallery();
    } catch (e) {
        gallery.innerHTML = "<p>Error al cargar el perfil.</p>";
    }
}

function renderGallery() {
    gallery.innerHTML = "";
    allImages.forEach((img, i) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<img src="${img.thumb}" loading="lazy">`;
        card.onclick = () => openLightbox(i);
        gallery.appendChild(card);
    });
}

function openLightbox(i) {
    if (i < 0 || i >= allImages.length) return;
    currentIndex = i;
    const data = allImages[i];
    lbImg.src = data.full;
    lbText.innerText = data.text;
    lbStats.innerHTML = `<span style="font-size:20px">❤️ ${data.likes}</span>`;
    bskyLink.href = data.link;
    lightbox.classList.add("active");
    document.body.style.overflow = "hidden";
}

document.getElementById("closeBtn").onclick = () => {
    lightbox.classList.remove("active");
    document.body.style.overflow = "auto";
};

document.getElementById("nextBtn").onclick = (e) => { e.stopPropagation(); openLightbox(currentIndex + 1); };
document.getElementById("prevBtn").onclick = (e) => { e.stopPropagation(); openLightbox(currentIndex - 1); };

document.addEventListener("keydown", e => {
    if (!lightbox.classList.contains("active")) return;
    if (e.key === "ArrowRight") openLightbox(currentIndex + 1);
    if (e.key === "ArrowLeft") openLightbox(currentIndex - 1);
    if (e.key === "Escape") document.getElementById("closeBtn").onclick();
});
</script>
</body>
</html>
