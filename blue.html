<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATProto Feed - Personalizado</title>

    <style>
        :root {
            --bg: #000;
            --accent: #1da1f2;
            --text-main: #fff;
            --text-dim: #aaa;
            --card-bg: #111;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            width: 100%;
        }

        /* HEADER */
        .header {
            border-bottom: 1px solid #222;
            padding: 20px 16px;
        }

        .search {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .search input {
            background: #111;
            border: 2px solid #333;
            color: #fff;
            padding: 14px 20px;
            border-radius: 30px 0 0 30px;
            flex-grow: 1;
            font-size: 18px;
            outline: none;
        }

        .search button {
            background: #fff;
            border: none;
            color: #000;
            padding: 0 25px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0 30px 30px 0;
            font-size: 18px;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 16px;
            max-width: 900px;
            margin: auto;
            flex-wrap: wrap;
        }

        .profile img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #222;
        }

        .profile-info { flex: 1; min-width: 200px; }
        .profile-info h2 { margin: 0; font-size: 22px; }
        .profile-info p { margin: 6px 0; font-size: 15px; color: var(--text-dim); line-height: 1.4; }

        .follow {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }

        /* GRID */
        .grid {
            max-width: 1000px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            padding: 4px;
        }

        .card {
            position: relative;
            background: var(--card-bg);
            aspect-ratio: 1/1;
            overflow: hidden;
            cursor: pointer;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .card:hover img { transform: scale(1.05); }

        /* Contador de likes en miniatura */
        .card-stats {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* LIGHTBOX */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
        }

        .lightbox.active { display: flex; }

        .lb-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #fff;
            z-index: 1001;
        }

        .lb-content {
            background: #111;
            width: 90%;
            max-width: 1100px;
            height: 85%;
            display: flex;
            border-radius: 12px;
            overflow: hidden;
        }

        .lb-img {
            flex: 1.5;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lb-img img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .lb-text-area {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #222;
        }

        .lb-text {
            flex: 1;
            overflow-y: auto;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .lb-stats {
            padding-top: 15px;
            border-top: 1px solid #333;
            color: var(--accent);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* MÓVIL */
        @media(max-width: 768px) {
            .lb-content { flex-direction: column; height: 95%; }
            .lb-img { flex: 1; }
            .lb-text-area { flex: none; height: 40%; border-left: none; border-top: 1px solid #222; padding: 15px; }
            .lb-text { font-size: 16px; }
            .profile { justify-content: center; text-align: center; }
            .follow { width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="search">
        <input id="userInput" placeholder="Usuario de Bluesky">
        <button id="goBtn">Buscar</button>
    </div>
    <div id="profile" class="profile"></div>
</div>

<div id="gallery" class="grid"></div>

<div id="lightbox" class="lightbox">
    <div id="closeBtn" class="lb-close">✕</div>
    <div class="lb-content">
        <div class="lb-img">
            <img id="lbImg">
        </div>
        <div class="lb-text-area">
            <div id="lbText" class="lb-text"></div>
            <div id="lbStats" class="lb-stats"></div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // CONFIGURACIÓN DE USUARIO POR DEFECTO
    // ==========================================
    const DEFAULT_USER = "iasuarezv.com"; 
    // ==========================================

    const input = document.getElementById("userInput");
    const btn = document.getElementById("goBtn");
    const gallery = document.getElementById("gallery");
    const profile = document.getElementById("profile");
    const lightbox = document.getElementById("lightbox");
    const lbImg = document.getElementById("lbImg");
    const lbText = document.getElementById("lbText");
    const lbStats = document.getElementById("lbStats");
    const closeBtn = document.getElementById("closeBtn");

    // Inicio: Cargar el guardado o el defecto
    const saved = localStorage.getItem("user") || DEFAULT_USER;
    input.value = saved;
    load(saved);

    btn.onclick = start;
    input.addEventListener("keydown", e => { if(e.key === "Enter") start(); });

    function start(){
        const user = input.value.trim().replace("@", "");
        if(!user) return;
        localStorage.setItem("user", user);
        gallery.innerHTML = "";
        load(user);
    }

    async function load(handle){
        try {
            // Resolver DID
            const didRes = await fetch(`https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${handle}`);
            const {did} = await didRes.json();
            if(!did) return;

            // Perfil
            const profRes = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${did}`);
            const prof = await profRes.json();

            profile.innerHTML = `
                <img src="${prof.avatar || ''}">
                <div class="profile-info">
                    <h2>${prof.displayName || handle}</h2>
                    <p>${prof.description || ""}</p>
                </div>
                <button class="follow" onclick="window.open('https://bsky.app/profile/${handle}', '_blank')">Ver en Bluesky</button>
            `;

            // Feed
            const res = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${did}&limit=60`);
            const data = await res.json();

            data.feed.forEach(item => {
                const post = item.post;
                const likes = post.likeCount || 0;
                const text = post.record?.text || "";
                
                // Imágenes (soporta múltiples estructuras de la API)
                let imgs = [];
                if(post.embed?.images) imgs = post.embed.images;
                else if(post.embed?.media?.images) imgs = post.embed.media.images;

                imgs.forEach(img => {
                    // Fix de URL: Usar el blob ref directamente
                    const cid = img.image?.ref?.$link || img.image?.$link;
                    if(!cid) return;
                    
                    const thumb = `https://cdn.bsky.app/img/feed_thumbnail/plain/${did}/${cid}@jpeg`;
                    const full = `https://cdn.bsky.app/img/feed_fullsize/plain/${did}/${cid}@jpeg`;

                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <img src="${thumb}" loading="lazy">
                        <div class="card-stats">❤️ ${likes}</div>
                    `;

                    card.onclick = () => {
                        lbImg.src = full;
                        lbText.innerText = text;
                        lbStats.innerHTML = `❤️ ${likes} likes`;
                        lightbox.classList.add("active");
                    };

                    gallery.appendChild(card);
                });
            });
        } catch(e) { 
            console.error("Error:", e);
            gallery.innerHTML = "<p style='padding:20px'>No se pudo cargar el perfil. Revisa el nombre de usuario.</p>";
        }
    }

    // Cerrar Lightbox
    closeBtn.onclick = () => lightbox.classList.remove("active");
    lightbox.onclick = (e) => { if(e.target === lightbox) lightbox.classList.remove("active"); };
</script>

</body>
</html>
