<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ATProto Viewer</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: system-ui, sans-serif;
}

header {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #222;
}

input {
  padding: 10px;
  background: #111;
  border: 1px solid #333;
  color: #fff;
  width: 260px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 6px;
}

.card {
  cursor: pointer;
}

.card img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  z-index: 999;
}

.modal.active {
  display: flex;
}

.modal-content {
  display: flex;
  width: 100%;
  height: 100%;
}

.modal img {
  max-width: 60%;
  object-fit: contain;
}

.modal-text {
  padding: 20px;
  width: 40%;
  overflow-y: auto;
}

/* móvil */
@media (max-width: 700px) {
  .modal-content {
    flex-direction: column;
  }

  .modal img {
    max-width: 100%;
    max-height: 60%;
  }

  .modal-text {
    width: 100%;
    height: 40%;
  }
}
</style>
</head>

<body>

<header>
  <input id="userInput" placeholder="usuario">
</header>

<div class="grid" id="gallery"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <img id="modalImg">
    <div class="modal-text" id="modalText"></div>
  </div>
</div>

<script>
const input = document.getElementById("userInput");
const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const modalText = document.getElementById("modalText");

const saved = localStorage.getItem("atproto_user");
if (saved) {
  input.value = saved;
  load(saved);
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const user = input.value.trim();
    if (!user) return;

    localStorage.setItem("atproto_user", user);
    gallery.innerHTML = "";
    load(user);
  }
});

modal.addEventListener("click", () => {
  modal.classList.remove("active");
});

async function load(handle) {
  const didRes = await fetch(`https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${handle}`);
  const { did } = await didRes.json();

  let res = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${did}&limit=50`);
  let data = await res.json();

  data.feed.forEach(item => {
    const post = item.post;
    const text = post.record.text || "";

    let images = [];
    if (post.embed?.images) images = post.embed.images;
    if (post.embed?.media?.images) images = post.embed.media.images;
    if (post.record?.embed?.images) images = post.record.embed.images;

    images.forEach(img => {
      const cid = img.image.ref.$link;
      const src = `https://cdn.bsky.app/img/feed_fullsize/plain/${did}/${cid}@jpeg`;

      const card = document.createElement("div");
      card.className = "card";

      const image = document.createElement("img");
      image.src = src;

      card.appendChild(image);
      gallery.appendChild(card);

      card.onclick = () => {
        modal.classList.add("active");
        modalImg.src = src;
        modalText.innerText = text;
      };
    });
  });
}
</script>

</body>
</html>
