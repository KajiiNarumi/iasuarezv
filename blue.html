<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galesky</title>

<style>
:root{
--bg:#000;
--text:#fff;
--dim:#aaa;
--line:#222;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:system-ui;
}

/* buscador */
.search{
max-width:900px;
margin:20px auto;
display:flex;
padding:0 20px;
}

.search input{
flex:1;
padding:14px;
background:#111;
border:1px solid #333;
color:#fff;
border-radius:30px 0 0 30px;
}

.search button{
padding:0 25px;
border:none;
background:#fff;
border-radius:0 30px 30px 0;
cursor:pointer;
}

/* perfil */
.profile{
max-width:900px;
margin:auto;
padding:20px;
display:flex;
gap:20px;
border-bottom:1px solid var(--line);
align-items:center;
flex-wrap:wrap;
}

.profile img{
width:80px;
height:80px;
border-radius:50%;
}

.profile-info{flex:1;}

.profile-info h2{margin:0;font-size:22px;}

.profile-info p{
margin:6px 0;
color:var(--dim);
line-height:1.4;
word-break:break-word;
display:-webkit-box;
-webkit-line-clamp:3;
-webkit-box-orient:vertical;
overflow:hidden;
}

.profile-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
background:#111;
border:1px solid #444;
color:#fff;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
font-size:13px;
}

/* albums */
.albums{
max-width:1000px;
margin:10px auto;
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.album-btn{
padding:6px 12px;
border:1px solid #333;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
font-size:14px;
color:var(--dim);
}

.album-btn.active{
color:#fff;
border-color:#fff;
}

/* grid */
.grid{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
padding:6px;
}

.card{
aspect-ratio:1/1;
overflow:hidden;
border-radius:10px;
background:#111;
cursor:pointer;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* modal */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

.modal.active{display:flex;}

.modal-box{
width:100%;
max-width:1000px;
max-height:90vh;
background:#111;
border-radius:12px;
overflow:auto;
padding:20px;
}

.user-list{
display:flex;
flex-direction:column;
gap:10px;
}

.user-item{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.user-item img{
width:40px;
height:40px;
border-radius:50%;
}

</style>
</head>

<body>

<div class="search">
<input id="userInput" placeholder="usuario">
<button id="goBtn">Buscar</button>
</div>

<div id="profile"></div>
<div id="albums" class="albums"></div>
<div id="gallery" class="grid"></div>

<div id="modal" class="modal">
<div class="modal-box" id="modalContent"></div>
</div>

<script>
let images=[];
let filtered=[];
let currentHandle="";

const input=document.getElementById("userInput");
const btn=document.getElementById("goBtn");
const gallery=document.getElementById("gallery");
const albumsBar=document.getElementById("albums");
const modal=document.getElementById("modal");
const modalContent=document.getElementById("modalContent");

/* persistencia */
const saved=localStorage.getItem("user")||"iasuarezv.com";
input.value=saved;

/* detectar URL tipo /user */
const pathUser=location.pathname.replace("/","");
if(pathUser){
load(pathUser);
}else{
load(saved);
}

input.addEventListener("keypress",e=>{if(e.key==="Enter")btn.click();});
btn.onclick=()=>{
const u=input.value.trim().replace("@","");
if(!u) return;
localStorage.setItem("user",u);
history.pushState({}, "", "/"+u);
load(u);
};

modal.onclick=e=>{if(e.target===modal)modal.classList.remove("active");};

async function load(user){

currentHandle=user;

const didRes=await fetch(`https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${user}`);
const {did}=await didRes.json();

const profRes=await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${did}`);
const prof=await profRes.json();

const feedRes=await fetch(`https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${did}&limit=100`);
const data=await feedRes.json();

images=[];
const tagMap={};

data.feed.forEach(item=>{
const post=item.post;

let imgs=[];
if(post.embed?.images) imgs.push(...post.embed.images);
if(post.embed?.media?.images) imgs.push(...post.embed.media.images);
if(post.record?.embed?.images) imgs.push(...post.record.embed.images);
if(post.record?.embed?.media?.images) imgs.push(...post.record.embed.media.images);

const text=post.record?.text||"";
const tags=(text.match(/#\w+/g)||[]).map(t=>t.toLowerCase());

imgs.forEach(img=>{
const cid=img.image?.ref?.$link||img.image?.$link;
if(!cid) return;

const imageData={
thumb:`https://cdn.bsky.app/img/feed_thumbnail/plain/${did}/${cid}@jpeg`,
text:text,
tags:tags
};

images.push(imageData);

tags.forEach(tag=>{
if(!tagMap[tag]) tagMap[tag]=[];
tagMap[tag].push(imageData);
});
});
});

/* perfil */
document.getElementById("profile").innerHTML=`
<div class="profile">
<img src="${prof.avatar||''}">
<div class="profile-info">
<h2>${prof.displayName||user}</h2>
<p>${prof.description||""}</p>
<span>${images.length} imágenes</span>
</div>

<div class="profile-actions">
<button class="btn" onclick="showFollows('${did}')">Siguiendo</button>
<button class="btn" onclick="showFollowers('${did}')">Seguidores</button>
<button class="btn" onclick="shareProfile()">Compartir</button>
</div>
</div>
`;

renderAlbums(tagMap);

filtered=[...images];
renderGallery();
}

/* albums */
function renderAlbums(tagMap){
albumsBar.innerHTML="";

const allBtn=document.createElement("div");
allBtn.className="album-btn active";
allBtn.innerText="Todo";
allBtn.onclick=()=>{
filtered=[...images];
setActive(allBtn);
renderGallery();
};
albumsBar.appendChild(allBtn);

Object.keys(tagMap).forEach(tag=>{
const btn=document.createElement("div");
btn.className="album-btn";
btn.innerText=tag.replace("#","");
btn.onclick=()=>{
filtered=tagMap[tag];
setActive(btn);
renderGallery();
};
albumsBar.appendChild(btn);
});
}

function setActive(el){
document.querySelectorAll(".album-btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

/* gallery */
function renderGallery(){
gallery.innerHTML="";
filtered.forEach(img=>{
const d=document.createElement("div");
d.className="card";

const im=new Image();
im.src=img.thumb;

im.onload=()=>{
d.appendChild(im);
gallery.appendChild(d);
};
});
}

/* seguidores */
async function showFollows(did){
const res=await fetch(`https://public.api.bsky.app/xrpc/app.bsky.graph.getFollows?actor=${did}&limit=50`);
const data=await res.json();
renderUsers(data.follows);
}

async function showFollowers(did){
const res=await fetch(`https://public.api.bsky.app/xrpc/app.bsky.graph.getFollowers?actor=${did}&limit=50`);
const data=await res.json();
renderUsers(data.followers);
}

function renderUsers(list){
modalContent.innerHTML='<div class="user-list"></div>';
const container=modalContent.querySelector(".user-list");

list.forEach(u=>{
const div=document.createElement("div");
div.className="user-item";
div.innerHTML=`<img src="${u.avatar||''}"><span>${u.handle}</span>`;
div.onclick=()=>{
modal.classList.remove("active");
load(u.handle);
};
container.appendChild(div);
});

modal.classList.add("active");
}

/* compartir */
function shareProfile(){
const url=location.origin+"/"+currentHandle;
navigator.clipboard.writeText(url);
alert("Copiado: "+url);
}
</script>

</body>
</html>
