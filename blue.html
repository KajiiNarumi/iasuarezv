<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ATProto Viewer</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: system-ui, sans-serif;
}

header {
  padding: 16px;
  text-align: center;
  border-bottom: 1px solid #111;
}

input {
  padding: 10px 14px;
  background: #111;
  border: 1px solid #222;
  color: #fff;
  width: 260px;
  border-radius: 6px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 16px;
}

.card img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}

/* MODAL */

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.96);
  display: none;
  z-index: 999;
}

.modal.active {
  display: flex;
}

.modal-wrapper {
  display: flex;
  width: 90%;
  height: 90%;
  margin: auto;
  gap: 40px;
}

.modal-img {
  flex: 1.2;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-img img {
  max-width: 100%;
  max-height: 100%;
  border-radius: 10px;
}

.modal-text {
  flex: 0.8;
  overflow-y: auto;
  padding-right: 10px;
}

.modal-text p {
  line-height: 1.5;
  font-size: 15px;
  color: #ccc;
}

/* botón cerrar */
.close {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 22px;
  cursor: pointer;
  color: #aaa;
}

/* móvil */
@media (max-width: 700px) {
  .grid {
    gap: 6px;
    padding: 6px;
  }

  .modal-wrapper {
    flex-direction: column;
    height: 100%;
    width: 100%;
    padding: 20px;
    gap: 20px;
  }

  .modal-img {
    flex: none;
    max-height: 60%;
  }

  .modal-text {
    flex: none;
    max-height: 40%;
    overflow-y: auto;
  }

  .modal-text p {
    font-size: 16px;
  }
}
</style>
</head>

<body>

<header>
  <input id="userInput" placeholder="usuario">
</header>

<div class="grid" id="gallery"></div>

<div class="modal" id="modal">
  <div class="close" id="closeBtn">✕</div>

  <div class="modal-wrapper">
    <div class="modal-img">
      <img id="modalImg">
    </div>

    <div class="modal-text">
      <p id="modalText"></p>
    </div>
  </div>
</div>

<script>
const input = document.getElementById("userInput");
const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const modalText = document.getElementById("modalText");
const closeBtn = document.getElementById("closeBtn");

const saved = localStorage.getItem("atproto_user");
if (saved) {
  input.value = saved;
  load(saved);
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const user = input.value.trim();
    if (!user) return;

    localStorage.setItem("atproto_user", user);
    gallery.innerHTML = "";
    load(user);
  }
});

closeBtn.onclick = () => modal.classList.remove("active");
modal.onclick = (e) => {
  if (e.target === modal) modal.classList.remove("active");
};

async function load(handle) {
  const didRes = await fetch(`https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${handle}`);
  const { did } = await didRes.json();

  let res = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${did}&limit=50`);
  let data = await res.json();

  data.feed.forEach(item => {
    const post = item.post;
    const text = post.record.text || "";

    let images = [];
    if (post.embed?.images) images = post.embed.images;
    if (post.embed?.media?.images) images = post.embed.media.images;
    if (post.record?.embed?.images) images = post.record.embed.images;

    images.forEach(img => {
      const cid = img.image.ref.$link;
      const src = `https://cdn.bsky.app/img/feed_fullsize/plain/${did}/${cid}@jpeg`;

      const image = document.createElement("img");
      image.src = src;

      image.onclick = () => {
        modal.classList.add("active");
        modalImg.src = src;
        modalText.innerText = text;
      };

      gallery.appendChild(image);
    });
  });
}
</script>

</body>
</html>
