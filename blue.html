<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galesky</title>

<style>
:root {
    --bg:#000;
    --accent:#1da1f2;
    --text-main:#fff;
    --text-dim:#aaa;
    --card-bg:#111;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text-main);
    font-family:system-ui;
}

/* HEADER */
.header{padding:20px 16px;border-bottom:1px solid #222;}

.search{
    display:flex;
    max-width:600px;
    margin:auto;
}

.search input{
    flex:1;
    padding:14px;
    background:#111;
    border:2px solid #333;
    color:#fff;
    border-radius:30px 0 0 30px;
}

.search button{
    padding:0 25px;
    border:none;
    background:#fff;
    border-radius:0 30px 30px 0;
    cursor:pointer;
}

.profile{
    max-width:900px;
    margin:auto;
    display:flex;
    gap:16px;
    align-items:center;
}

.profile img{
    width:80px;
    height:80px;
    border-radius:50%;
}

.profile-info{flex:1;}
.profile-info h2{margin:0;font-size:22px;}
.profile-info p{color:#aaa;font-size:15px;}

.img-count{color:var(--accent);font-size:13px;}

.follow{
    padding:10px 20px;
    border:none;
    border-radius:25px;
    background:#fff;
    cursor:pointer;
}

/* GRID */
.grid{
    max-width:1000px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:4px;
    padding:4px;
}

.card{
    aspect-ratio:1/1;
    overflow:hidden;
    position:relative;
    cursor:pointer;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card-stats{
    position:absolute;
    bottom:8px;
    right:8px;
    background:rgba(0,0,0,.6);
    padding:4px 8px;
    border-radius:12px;
    font-size:12px;
}

/* LIGHTBOX */
.lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    display:none;
    justify-content:center;
    align-items:center;
}

.lightbox.active{display:flex;}

.lb-content{
    width:90%;
    height:90%;
    display:flex;
    background:#111;
}

.lb-img{
    flex:1.5;
    display:flex;
    justify-content:center;
    align-items:center;
}

.lb-img img{
    max-width:100%;
    max-height:100%;
}

.lb-text-area{
    flex:1;
    padding:20px;
    display:flex;
    flex-direction:column;
}

.lb-text{
    flex:1;
    overflow:auto;
}

.lb-close{
    position:absolute;
    top:20px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <div class="search">
        <input id="userInput">
        <button id="goBtn">Buscar</button>
    </div>
    <div id="profile" class="profile"></div>
</div>

<div id="gallery" class="grid"></div>

<div id="lightbox" class="lightbox">
    <div class="lb-close" id="closeBtn">✕</div>
    <div class="lb-content">
        <div class="lb-img"><img id="lbImg"></div>
        <div class="lb-text-area">
            <div id="lbText" class="lb-text"></div>
            <div id="lbStats"></div>
        </div>
    </div>
</div>

<script>
const DEFAULT_USER="iasuarezv.com";

const input=document.getElementById("userInput");
const btn=document.getElementById("goBtn");
const gallery=document.getElementById("gallery");
const profile=document.getElementById("profile");

const lightbox=document.getElementById("lightbox");
const lbImg=document.getElementById("lbImg");
const lbText=document.getElementById("lbText");
const lbStats=document.getElementById("lbStats");
const closeBtn=document.getElementById("closeBtn");

let allImages=[];
let currentIndex=0;

const saved=localStorage.getItem("user")||DEFAULT_USER;
input.value=saved;
load(saved);

btn.onclick=start;
input.addEventListener("keydown",e=>{if(e.key==="Enter")start();});

function start(){
    const user=input.value.trim().replace("@","");
    if(!user)return;
    localStorage.setItem("user",user);
    gallery.innerHTML="";
    allImages=[];
    load(user);
}

async function load(handle){

const didRes=await fetch(`https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${handle}`);
const {did}=await didRes.json();
if(!did)return;

const profRes=await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${did}`);
const prof=await profRes.json();

const res=await fetch(`https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${did}&limit=100`);
const data=await res.json();

data.feed.forEach(item=>{
const post=item.post;
const text=post.record?.text||"";
const likes=post.likeCount||0;

/* 🔥 FIX DEFINITIVO */
let rawImgs=[];
if(post.embed?.images) rawImgs.push(...post.embed.images);
if(post.embed?.media?.images) rawImgs.push(...post.embed.media.images);
if(post.record?.embed?.images) rawImgs.push(...post.record.embed.images);
if(post.record?.embed?.media?.images) rawImgs.push(...post.record.embed.media.images);

rawImgs.forEach(img=>{
const cid=img.image?.ref?.$link||img.image?.$link;
if(!cid)return;

allImages.push({
thumb:`https://cdn.bsky.app/img/feed_thumbnail/plain/${did}/${cid}@jpeg`,
full:`https://cdn.bsky.app/img/feed_fullsize/plain/${did}/${cid}@jpeg`,
text,
likes
});
});
});

profile.innerHTML=`
<img src="${prof.avatar||''}">
<div class="profile-info">
<h2>${prof.displayName||handle}</h2>
<p>${prof.description||""}</p>
<div class="img-count">📸 ${allImages.length}</div>
</div>
<button class="follow" onclick="window.open('https://bsky.app/profile/${handle}')">Ver</button>
`;

allImages.forEach((img,i)=>{
const card=document.createElement("div");
card.className="card";
card.innerHTML=`<img src="${img.thumb}"><div class="card-stats">❤️ ${img.likes}</div>`;
card.onclick=()=>openLightbox(i);
gallery.appendChild(card);
});
}

function openLightbox(i){
currentIndex=i;
const d=allImages[i];
lbImg.src=d.full;
lbText.innerText=d.text;
lbStats.innerText=`❤️ ${d.likes}`;
lightbox.classList.add("active");
}

closeBtn.onclick=()=>lightbox.classList.remove("active");
lightbox.onclick=e=>{if(e.target===lightbox)lightbox.classList.remove("active");};

</script>

</body>
</html>
