<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galesky</title>

<style>
:root{
--bg:#000;
--text:#fff;
--dim:#aaa;
--line:#222;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:system-ui;
}

/* buscador */
.search{
max-width:900px;
margin:20px auto;
display:flex;
padding:0 20px;
}

.search input{
flex:1;
padding:14px;
background:#111;
border:1px solid #333;
color:#fff;
border-radius:30px 0 0 30px;
}

.search button{
padding:0 25px;
border:none;
background:#fff;
border-radius:0 30px 30px 0;
cursor:pointer;
}

/* perfil */
.profile{
max-width:900px;
margin:auto;
padding:20px;
display:flex;
gap:20px;
border-bottom:1px solid var(--line);
align-items:center;
flex-wrap:wrap;
}

.profile img{
width:80px;
height:80px;
border-radius:50%;
}

.profile-info{flex:1;}

.profile-info h2{margin:0;font-size:22px;}

.profile-info p{
margin:6px 0;
color:var(--dim);
line-height:1.4;
word-break:break-word;
display:-webkit-box;
-webkit-line-clamp:3;
-webkit-box-orient:vertical;
overflow:hidden;
}

.profile-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
background:#111;
border:1px solid #444;
color:#fff;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
font-size:13px;
text-decoration:none;
}

/* albums */
.albums{
max-width:1000px;
margin:10px auto;
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.album-btn{
padding:6px 12px;
border:1px solid #333;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
font-size:14px;
color:var(--dim);
}

.album-btn.active{
color:#fff;
border-color:#fff;
}

/* grid */
.grid{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
padding:6px;
}

.card{
aspect-ratio:1/1;
overflow:hidden;
border-radius:10px;
background:#111;
cursor:pointer;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* modal */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

.modal.active{display:flex;}

.modal-box{
width:100%;
max-width:1000px;
max-height:90vh;
background:#111;
border-radius:12px;
overflow:hidden;
display:flex;
flex-direction:row;
position:relative;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:28px;
cursor:pointer;
z-index:20;
}

.modal-img{
flex:1.5;
background:#000;
display:flex;
justify-content:center;
align-items:center;
}

.modal-img img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.modal-info{
flex:1;
padding:20px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

/* móvil */
@media(max-width:768px){
.modal-box{flex-direction:column;height:95vh;}
.modal-img{aspect-ratio:1/1;}
}

</style>
</head>

<body>

<div class="search">
<input id="userInput" placeholder="usuario">
<button id="goBtn">Buscar</button>
</div>

<div id="profile"></div>
<div id="albums" class="albums"></div>
<div id="gallery" class="grid"></div>

<div id="modal" class="modal">
<div class="modal-box">
<div class="close" id="closeBtn">✕</div>

<div class="modal-img">
<img id="mImg">
</div>

<div class="modal-info">
<a id="postLink" class="btn" target="_blank">Ver publicación</a>
<div id="mText"></div>
<div id="mLikes"></div>
</div>

</div>
</div>

<script>
let images=[];
let filtered=[];
let index=0;
let currentHandle="";

const input=document.getElementById("userInput");
const btn=document.getElementById("goBtn");
const gallery=document.getElementById("gallery");
const albumsBar=document.getElementById("albums");
const modal=document.getElementById("modal");

/* URL PARAM */
const params=new URLSearchParams(window.location.search);
const urlUser=params.get("user");

/* persistencia */
const saved=localStorage.getItem("user")||"iasuarezv.com";
const initialUser=urlUser||saved;

input.value=initialUser;
load(initialUser);

input.addEventListener("keypress",e=>{if(e.key==="Enter")btn.click();});

btn.onclick=()=>{
const u=input.value.trim().replace("@","");
if(!u)return;
localStorage.setItem("user",u);
window.location.search=`?user=${u}`;
};

modal.onclick=e=>{if(e.target===modal)modal.classList.remove("active");};
document.getElementById("closeBtn").onclick=()=>modal.classList.remove("active");

async function load(user){

currentHandle=user;

const didRes=await fetch(`https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${user}`);
const {did}=await didRes.json();

const profRes=await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${did}`);
const prof=await profRes.json();

const feedRes=await fetch(`https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${did}&limit=100`);
const data=await feedRes.json();

images=[];
const tagMap={};

data.feed.forEach(item=>{
const post=item.post;

let imgs=[];
if(post.embed?.images) imgs.push(...post.embed.images);
if(post.embed?.media?.images) imgs.push(...post.embed.media.images);
if(post.record?.embed?.images) imgs.push(...post.record.embed.images);
if(post.record?.embed?.media?.images) imgs.push(...post.record.embed.media.images);

const text=post.record?.text||"";
const tags=(text.match(/#\w+/g)||[]).map(t=>t.toLowerCase());

imgs.forEach(img=>{
const cid=img.image?.ref?.$link||img.image?.$link;
if(!cid)return;

const imageData={
thumb:`https://cdn.bsky.app/img/feed_thumbnail/plain/${did}/${cid}@jpeg`,
full:`https://cdn.bsky.app/img/feed_fullsize/plain/${did}/${cid}@jpeg`,
text:text,
likes:post.likeCount||0,
uri:post.uri,
tags:tags
};

images.push(imageData);

tags.forEach(tag=>{
if(!tagMap[tag]) tagMap[tag]=[];
tagMap[tag].push(imageData);
});
});
});

/* perfil */
document.getElementById("profile").innerHTML=`
<div class="profile">
<img src="${prof.avatar||''}">
<div class="profile-info">
<h2>${prof.displayName||user}</h2>
<p>${prof.description||""}</p>
<span>${images.length} imágenes</span>
</div>

<div class="profile-actions">
<a class="btn" href="https://bsky.app/profile/${user}" target="_blank">Ver perfil</a>
<button class="btn" onclick="shareProfile()">Compartir</button>
</div>
</div>
`;

renderAlbums(tagMap);

filtered=[...images];
renderGallery();
}

/* albums */
function renderAlbums(tagMap){
albumsBar.innerHTML="";

const allBtn=document.createElement("div");
allBtn.className="album-btn active";
allBtn.innerText="Todo";
allBtn.onclick=()=>{
filtered=[...images];
setActive(allBtn);
renderGallery();
};
albumsBar.appendChild(allBtn);

Object.keys(tagMap).forEach(tag=>{
const btn=document.createElement("div");
btn.className="album-btn";
btn.innerText=tag.replace("#","");
btn.onclick=()=>{
filtered=tagMap[tag];
setActive(btn);
renderGallery();
};
albumsBar.appendChild(btn);
});
}

function setActive(el){
document.querySelectorAll(".album-btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

/* gallery */
function renderGallery(){
gallery.innerHTML="";
filtered.forEach((img,i)=>{
const d=document.createElement("div");
d.className="card";

const im=new Image();
im.src=img.thumb;

im.onload=()=>{
d.appendChild(im);
d.onclick=()=>open(i);
gallery.appendChild(d);
};
});
}

/* modal */
function open(i){
index=i;
const d=filtered[i];

document.getElementById("mImg").src=d.full;
document.getElementById("mText").innerText=d.text;
document.getElementById("mLikes").innerText=`❤️ ${d.likes}`;

const parts=d.uri.split('/');
const postId=parts[parts.length-1];
document.getElementById("postLink").href=`https://bsky.app/profile/${currentHandle}/post/${postId}`;

modal.classList.add("active");
}

/* compartir */
function shareProfile(){
const url=`${location.origin}?user=${currentHandle}`;
navigator.clipboard.writeText(url);
alert("Copiado: "+url);
}
</script>

</body>
</html>
