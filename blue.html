<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galesky | AntuanSV</title>
    <style>
        :root {
            --bg: #000;
            --accent: #1da1f2;
            --text-main: #fff;
            --text-dim: #aaa;
            --card-bg: #111;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            overflow-x: hidden;
        }

        /* HEADER */
        .header { 
            padding: 30px 20px; 
            max-width: 900px; 
            margin: auto; 
        }
        
        .search { display: flex; margin-bottom: 25px; }
        .search input {
            flex: 1; padding: 12px 20px; background: #111; border: 1px solid #333;
            color: #fff; border-radius: 25px 0 0 25px; outline: none;
        }
        .search button {
            padding: 0 25px; border: none; background: #fff;
            border-radius: 0 25px 25px 0; cursor: pointer; font-weight: bold;
        }

        .profile { 
            display: flex; gap: 20px; align-items: center; 
            background: #0b0b0b; padding: 20px; border-radius: 15px;
        }
        .profile img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        .profile-info { flex: 1; }
        .profile-info h2 { margin: 0; font-size: 22px; }
        .profile-info p { color: var(--text-dim); margin: 5px 0; font-size: 14px; line-height: 1.3; }
        .img-count { color: var(--accent); font-weight: bold; font-size: 13px; }
        
        .btn-follow {
            background: #fff; color: #000; padding: 8px 18px; 
            border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 14px;
        }

        /* GRID - 3 COLUMNAS SIEMPRE */
        .grid {
            max-width: 1000px; margin: 10px auto; 
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px; padding: 3px;
        }
        .card { aspect-ratio: 1/1; overflow: hidden; background: #111; cursor: pointer; }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* LIGHTBOX MODAL */
        .lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: none; flex-direction: column; z-index: 10000;
        }
        .lightbox.active { display: flex; }

        .lb-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px;
        }
        .close-x { font-size: 32px; cursor: pointer; }
        .lb-bsky-btn { color: var(--accent); text-decoration: none; font-size: 14px; font-weight: bold; }

        .lb-content {
            flex: 1; display: flex; overflow: hidden; position: relative;
        }

        /* NAVEGACIÓN LATERAL */
        .nav-side {
            position: absolute; top: 0; bottom: 0; width: 50px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.2); border: none; color: #fff;
            font-size: 24px; cursor: pointer; z-index: 5;
        }
        .prev-s { left: 0; }
        .next-s { right: 0; }

        /* IMAGEN: VER COMPLETA */
        .lb-viewport {
            flex: 2; display: flex; align-items: center; justify-content: center;
            background: #000; padding: 5px;
        }
        .lb-viewport img { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; /* Esto evita el recorte */
        }

        /* INFO INFERIOR / LATERAL */
        .lb-details {
            flex: 1; background: #000; padding: 20px; border-left: 1px solid #222;
            overflow-y: auto; display: flex; flex-direction: column;
        }
        .lb-text { font-size: 16px; line-height: 1.4; margin-bottom: 15px; }
        .lb-stats { color: var(--accent); font-weight: bold; margin-top: auto; border-top: 1px solid #222; padding-top: 10px; }

        /* MÓVIL: AJUSTE DE MODAL */
        @media (max-width: 768px) {
            .profile { flex-direction: column; text-align: center; }
            .lb-content { flex-direction: column; }
            .lb-viewport { flex: 0 0 60%; } /* La imagen ocupa el 60% de la ventana */
            .lb-details { flex: 1; border-left: none; border-top: 1px solid #222; }
            .nav-side { width: 40px; background: rgba(0,0,0,0.4); height: 60%; top: 0; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="search">
        <input id="userInput" placeholder="iasuarezv.com">
        <button id="goBtn">Buscar</button>
    </div>
    <div id="profile"></div>
</div>

<div id="gallery" class="grid"></div>

<div id="lightbox" class="lightbox">
    <div class="lb-header">
        <a id="bskyLink" class="lb-bsky-btn" target="_blank">Ver en Bluesky</a>
        <div class="close-x" id="closeBtn">✕</div>
    </div>
    
    <div class="lb-content">
        <button class="nav-side prev-s" id="prevBtn">❮</button>
        <div class="lb-viewport">
            <img id="lbImg">
        </div>
        <button class="nav-side next-s" id="nextBtn">❯</button>

        <div class="lb-details">
            <div id="lbText" class="lb-text"></div>
            <div id="lbStats" class="lb-stats"></div>
        </div>
    </div>
</div>

<script>
const DEFAULT_USER = "iasuarezv.com";
let allImages = [];
let currentIndex = 0;

const input = document.getElementById("userInput");
const profile = document.getElementById("profile");
const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lbImg = document.getElementById("lbImg");

const saved = localStorage.getItem("user") || DEFAULT_USER;
input.value = saved;
load(saved);

document.getElementById("goBtn").onclick = () => {
    const user = input.value.trim().replace("@","");
    if(user) {
        localStorage.setItem("user", user);
        load(user);
    }
};

async function load(handle) {
    try {
        gallery.innerHTML = "<p>Cargando...</p>";
        allImages = [];

        const didRes = await fetch(`https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${handle}`);
        const { did } = await didRes.json();
        
        const profRes = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${did}`);
        const prof = await profRes.json();

        const feedRes = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${did}&limit=100`);
        const data = await feedRes.json();

        data.feed.forEach(item => {
            const post = item.post;
            const text = post.record?.text || "";
            const likes = post.likeCount || 0;
            const rkey = post.uri.split('/').pop();
            const link = `https://bsky.app/profile/${handle}/post/${rkey}`;

            let imgs = [];
            // Búsqueda exhaustiva de imágenes en todos los niveles
            if (post.embed?.images) imgs.push(...post.embed.images);
            if (post.embed?.media?.images) imgs.push(...post.embed.media.images);
            if (post.record?.embed?.images) imgs.push(...post.record.embed.images);
            if (post.embed?.record?.embed?.images) imgs.push(...post.embed.record.embed.images);

            imgs.forEach(img => {
                const cid = img.image?.ref?.$link || img.image?.$link;
                if (cid) {
                    allImages.push({
                        thumb: `https://cdn.bsky.app/img/feed_thumbnail/plain/${did}/${cid}@jpeg`,
                        full: `https://cdn.bsky.app/img/feed_fullsize/plain/${did}/${cid}@jpeg`,
                        text, likes, link
                    });
                }
            });
        });

        profile.innerHTML = `
            <div class="profile">
                <img src="${prof.avatar || ''}">
                <div class="profile-info">
                    <h2>${prof.displayName || handle}</h2>
                    <p>${prof.description || ""}</p>
                    <span class="img-count">📸 ${allImages.length} imágenes</span>
                </div>
                <a href="https://bsky.app/profile/${handle}" target="_blank" class="btn-follow">Seguir</a>
            </div>
        `;

        renderGallery();
    } catch (e) {
        gallery.innerHTML = "<p>Error al cargar el perfil de Bluesky.</p>";
    }
}

function renderGallery() {
    gallery.innerHTML = "";
    allImages.forEach((img, i) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<img src="${img.thumb}" loading="lazy">`;
        card.onclick = () => openLightbox(i);
        gallery.appendChild(card);
    });
}

function openLightbox(i) {
    if (i < 0 || i >= allImages.length) return;
    currentIndex = i;
    const data = allImages[i];
    lbImg.src = data.full;
    document.getElementById("lbText").innerText = data.text;
    document.getElementById("lbStats").innerText = `❤️ ${data.likes} likes`;
    document.getElementById("bskyLink").href = data.link;
    lightbox.classList.add("active");
    document.body.style.overflow = "hidden";
}

document.getElementById("closeBtn").onclick = () => {
    lightbox.classList.remove("active");
    document.body.style.overflow = "auto";
};

document.getElementById("nextBtn").onclick = (e) => { e.stopPropagation(); openLightbox(currentIndex + 1); };
document.getElementById("prevBtn").onclick = (e) => { e.stopPropagation(); openLightbox(currentIndex - 1); };

document.addEventListener("keydown", e => {
    if (!lightbox.classList.contains("active")) return;
    if (e.key === "ArrowRight") openLightbox(currentIndex + 1);
    if (e.key === "ArrowLeft") openLightbox(currentIndex - 1);
    if (e.key === "Escape") document.getElementById("closeBtn").onclick();
});
</script>
</body>
</html>
