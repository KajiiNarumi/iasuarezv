<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galesky</title>

<style>
:root{
--bg:#000;
--text:#fff;
--dim:#aaa;
--line:#222;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:system-ui;
}

/* buscador */
.search{
max-width:900px;
margin:20px auto;
display:flex;
padding:0 20px;
}

.search input{
flex:1;
padding:14px;
background:#111;
border:1px solid #333;
color:#fff;
border-radius:30px 0 0 30px;
}

.search button{
padding:0 25px;
border:none;
background:#fff;
border-radius:0 30px 30px 0;
cursor:pointer;
}

/* perfil */
.profile{
max-width:900px;
margin:auto;
padding:20px;
display:flex;
gap:20px;
border-bottom:1px solid var(--line);
align-items:center;
flex-wrap:wrap;
}

.profile img{
width:80px;
height:80px;
border-radius:50%;
}

.profile-info{flex:1;}

.profile-info h2{margin:0;font-size:22px;}

.profile-info p{
margin:6px 0;
color:var(--dim);
line-height:1.4;
display:-webkit-box;
-webkit-line-clamp:3;
-webkit-box-orient:vertical;
overflow:hidden;
}

.profile-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
background:#111;
border:1px solid #444;
color:#fff;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
font-size:13px;
}

/* albums */
.albums{
max-width:1000px;
margin:10px auto;
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.album-btn{
padding:6px 12px;
border:1px solid #333;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
font-size:14px;
color:var(--dim);
}

.album-btn.active{
color:#fff;
border-color:#fff;
}

/* grid */
.grid{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
padding:6px;
}

.card{
aspect-ratio:1/1;
overflow:hidden;
border-radius:10px;
background:#111;
cursor:pointer;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* modal */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

.modal.active{display:flex;}

.modal-box{
width:100%;
max-width:1000px;
max-height:90vh;
background:#111;
border-radius:12px;
overflow:hidden;
display:flex;
position:relative;
}

.modal-img{
flex:1.5;
display:flex;
justify-content:center;
align-items:center;
background:#000;
}

.modal-img img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.modal-info{
flex:1;
padding:20px;
overflow:auto;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:28px;
cursor:pointer;
}

/* flechas */
.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:30px;
background:rgba(0,0,0,.4);
padding:10px;
cursor:pointer;
}

.prev{left:10px;}
.next{right:10px;}

.user-list{
display:flex;
flex-direction:column;
gap:10px;
}

.user{
display:flex;
gap:10px;
align-items:center;
cursor:pointer;
}

.user img{
width:40px;
height:40px;
border-radius:50%;
}

@media(max-width:768px){
.modal-box{flex-direction:column;height:95vh;}
.modal-img{aspect-ratio:1/1;}
}
</style>
</head>

<body>

<div class="search">
<input id="userInput">
<button id="goBtn">Buscar</button>
</div>

<div id="profile"></div>
<div id="albums" class="albums"></div>
<div id="gallery" class="grid"></div>

<div id="modal" class="modal">
<div class="modal-box">

<div class="close" id="closeBtn">✕</div>
<div class="nav prev" id="prevBtn">❮</div>
<div class="nav next" id="nextBtn">❯</div>

<div class="modal-img">
<img id="mImg">
</div>

<div class="modal-info">
<a id="postLink" class="btn" target="_blank">Ver publicación</a>
<div id="mText"></div>
<div id="mLikes"></div>
</div>

</div>
</div>

<div id="userModal" class="modal">
<div class="modal-box">
<div class="close" onclick="userModal.classList.remove('active')">✕</div>
<div class="modal-info">
<div id="userList" class="user-list"></div>
</div>
</div>
</div>

<script>
let images=[], filtered=[], index=0, currentHandle="";

const params=new URLSearchParams(location.search);
const user=params.get("user")||localStorage.getItem("user")||"iasuarezv.com";

userInput.value=user;
load(user);

goBtn.onclick=()=>{
const u=userInput.value.trim().replace("@","");
if(!u)return;
localStorage.setItem("user",u);
history.pushState({}, "", "?user="+u);
load(u);
};

async function load(handle){

currentHandle=handle;
history.replaceState({}, "", "?user="+handle);

const didRes=await fetch(`https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${handle}`);
const {did}=await didRes.json();

const prof=await (await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${did}`)).json();
const data=await (await fetch(`https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${did}&limit=100`)).json();

images=[];
const tagMap={};

data.feed.forEach(item=>{
const p=item.post;
const text=p.record?.text||"";
const tags=(text.match(/#\w+/g)||[]).map(t=>t.toLowerCase());

let imgs=[];
if(p.embed?.images) imgs.push(...p.embed.images);
if(p.embed?.media?.images) imgs.push(...p.embed.media.images);
if(p.record?.embed?.images) imgs.push(...p.record.embed.images);
if(p.record?.embed?.media?.images) imgs.push(...p.record.embed.media.images);

imgs.forEach(img=>{
const cid=img.image?.ref?.$link||img.image?.$link;
if(!cid)return;

const obj={
thumb:`https://cdn.bsky.app/img/feed_thumbnail/plain/${did}/${cid}@jpeg`,
full:`https://cdn.bsky.app/img/feed_fullsize/plain/${did}/${cid}@jpeg`,
text,
likes:p.likeCount||0,
uri:p.uri,
tags
};

images.push(obj);

tags.forEach(tag=>{
if(!tagMap[tag]) tagMap[tag]=[];
tagMap[tag].push(obj);
});
});
});

/* perfil */
profile.innerHTML=`
<div class="profile">
<img src="${prof.avatar||''}">
<div class="profile-info">
<h2>${prof.displayName||handle}</h2>
<p>${prof.description||""}</p>
</div>

<div class="profile-actions">
<a class="btn" href="https://bsky.app/profile/${handle}" target="_blank">Ver perfil</a>
<button class="btn" onclick="share()">Compartir</button>
<button class="btn" onclick="followers('${did}')">Seguidores</button>
<button class="btn" onclick="follows('${did}')">Siguiendo</button>
</div>
</div>
`;

renderAlbums(tagMap);

filtered=[...images];
render();
}

/* albums */
function renderAlbums(tagMap){
albums.innerHTML="";

const allBtn=document.createElement("div");
allBtn.className="album-btn active";
allBtn.innerText="Todo";
allBtn.onclick=()=>{filtered=[...images];setActive(allBtn);render();};
albums.appendChild(allBtn);

Object.keys(tagMap).forEach(tag=>{
if(tagMap[tag].length===0)return;

const b=document.createElement("div");
b.className="album-btn";
b.innerText=tag.replace("#","");
b.onclick=()=>{filtered=tagMap[tag];setActive(b);render();};
albums.appendChild(b);
});
}

function setActive(el){
document.querySelectorAll(".album-btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

/* gallery */
function render(){
gallery.innerHTML="";
filtered.forEach((img,i)=>{
const d=document.createElement("div");
d.className="card";
d.innerHTML=`<img src="${img.thumb}">`;
d.onclick=()=>open(i);
gallery.appendChild(d);
});
}

/* modal */
function open(i){
index=i;
const d=filtered[i];

mImg.src=d.full;
mText.innerText=d.text;
mLikes.innerText="❤️ "+d.likes;

const id=d.uri.split("/").pop();
postLink.href=`https://bsky.app/profile/${currentHandle}/post/${id}`;

modal.classList.add("active");
}

prevBtn.onclick=e=>{e.stopPropagation();if(index>0)open(index-1);};
nextBtn.onclick=e=>{e.stopPropagation();if(index<filtered.length-1)open(index+1);};

closeBtn.onclick=()=>modal.classList.remove("active");
modal.onclick=e=>{if(e.target===modal)modal.classList.remove("active");};

/* followers */
async function followers(did){
const res=await fetch(`https://public.api.bsky.app/xrpc/app.bsky.graph.getFollowers?actor=${did}`);
const data=await res.json();
showUsers(data.followers);
}

async function follows(did){
const res=await fetch(`https://public.api.bsky.app/xrpc/app.bsky.graph.getFollows?actor=${did}`);
const data=await res.json();
showUsers(data.follows);
}

function showUsers(list){
userList.innerHTML="";
list.forEach(u=>{
const d=document.createElement("div");
d.className="user";
d.innerHTML=`<img src="${u.avatar||''}"><span>${u.handle}</span>`;
d.onclick=()=>{userModal.classList.remove("active");load(u.handle);};
userList.appendChild(d);
});
userModal.classList.add("active");
}

/* compartir */
function share(){
const url=window.location.href;
navigator.clipboard.writeText(url).catch(()=>{
prompt("Copia el enlace:",url);
});
}
</script>

</body>
</html>
