<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Punto 1: Escala 1:1 fija para evitar zoom involuntario -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATProto Feed</title>

    <style>
        :root {
            --bg: #000;
            --accent: #1da1f2;
            --text-main: #fff;
            --text-dim: #aaa;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            width: 100%;
        }

        /* HEADER & SEARCH */
        .header {
            border-bottom: 1px solid #222;
            padding: 20px 16px;
        }

        /* Punto 2: Buscador más visible y grande */
        .search {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .search input {
            background: #111;
            border: 2px solid #333;
            color: #fff;
            padding: 14px 20px;
            border-radius: 30px 0 0 30px;
            flex-grow: 1;
            font-size: 18px; /* Más grande en PC y móvil */
            outline: none;
            transition: border-color 0.3s;
        }

        .search input:focus { border-color: var(--accent); }

        .search button {
            background: #fff;
            border: none;
            color: #000;
            padding: 0 25px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0 30px 30px 0;
            font-size: 18px;
        }

        /* Punto 3: Perfil responsivo y botón visible */
        .profile {
            display: flex;
            align-items: center;
            gap: 16px;
            max-width: 900px;
            margin: auto;
            flex-wrap: wrap; /* Permite que el botón baje si no hay espacio */
        }

        .profile img {
            width: 80px; /* Más grande */
            height: 80px;
            border-radius: 50%;
            border: 2px solid #222;
        }

        .profile-info {
            flex: 1;
            min-width: 200px;
        }

        .profile-info h2 {
            margin: 0;
            font-size: 22px;
        }

        .profile-info p {
            margin: 6px 0;
            font-size: 15px;
            color: var(--text-dim);
            line-height: 1.4;
        }

        .follow {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        /* GRID */
        .grid {
            max-width: 1000px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 4px;
            padding: 4px;
        }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .card img:hover { opacity: 0.8; }

        /* LIGHTBOX - Punto 4 y 5 */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
        }

        .lightbox.active { display: flex; }

        .lb-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #fff;
            z-index: 1001;
        }

        .lb-content {
            background: #111;
            width: 90%; /* Punto 4: No ocupa todo el ancho */
            max-width: 1100px;
            height: 85%; /* Punto 4: Entre 80 y 99% */
            display: flex;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .lb-img {
            flex: 1.5; /* Más espacio para la imagen */
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .lb-img img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .lb-text {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            font-size: 18px; /* Punto 4: Texto legible */
            line-height: 1.6;
            color: #efefef;
            border-left: 1px solid #222;
        }

        /* MÓVIL - Responsivo */
        @media(max-width: 768px) {
            .search input { font-size: 16px; padding: 12px; }
            
            .profile { justify-content: center; text-align: center; }
            .profile-info { min-width: 100%; }
            .follow { margin: 10px auto; width: 100%; }

            .grid { grid-template-columns: repeat(3, 1fr); gap: 2px; }

            /* Punto 5: Imagen arriba, texto abajo en móvil */
            .lb-content {
                flex-direction: column;
                width: 95%;
                height: 90%;
            }

            .lb-img { flex: 1; }

            .lb-text {
                flex: none;
                height: 40%;
                border-left: none;
                border-top: 1px solid #222;
                padding: 15px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="search">
        <input id="userInput" placeholder="Ingresa usuario (ej: bsky.app)">
        <button id="goBtn">Buscar</button>
    </div>
    <div class="profile" id="profile"></div>
</div>

<div class="grid" id="gallery"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <div class="lb-close" id="closeBtn">✕</div>
    <div class="lb-content">
        <div class="lb-img">
            <img id="lbImg">
        </div>
        <div class="lb-text" id="lbText"></div>
    </div>
</div>

<script>
    // Tu lógica de JS original se mantiene, solo corregimos la interacción del lightbox
    const input = document.getElementById("userInput");
    const btn = document.getElementById("goBtn");
    const gallery = document.getElementById("gallery");
    const profile = document.getElementById("profile");
    const lightbox = document.getElementById("lightbox");
    const lbImg = document.getElementById("lbImg");
    const lbText = document.getElementById("lbText");
    const closeBtn = document.getElementById("closeBtn");

    const saved = localStorage.getItem("user");
    if(saved){ input.value=saved; load(saved); }

    btn.onclick = start;
    input.addEventListener("keydown",e=>{ if(e.key==="Enter") start(); });

    function start(){
        const user=input.value.trim().replace("@", "");
        if(!user)return;
        localStorage.setItem("user",user);
        gallery.innerHTML="";
        load(user);
    }

    async function load(handle){
        try {
            const didRes = await fetch(`https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${handle}`);
            const {did} = await didRes.json();
            
            const profRes = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${did}`);
            const prof = await profRes.json();

            profile.innerHTML = `
                <img src="${prof.avatar || ''}">
                <div class="profile-info">
                    <h2>${prof.displayName || handle}</h2>
                    <p>${prof.description || ""}</p>
                </div>
                <button class="follow" id="followBtn">Ver en Bluesky</button>
            `;

            document.getElementById("followBtn").onclick=()=> window.open(`https://bsky.app/profile/${handle}`,"_blank");

            const res = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${did}&limit=50`);
            const data = await res.json();

            data.feed.forEach(item => {
                const post = item.post;
                const text = post.record?.text || "";
                let imgs = post.embed?.images || post.embed?.media?.images || post.record?.embed?.images || [];

                imgs.forEach(img => {
                    const cid = img.image?.ref?.$link || img.image?.$link;
                    const src = `https://cdn.bsky.app/img/feed_fullsize/plain/${did}/${cid}@jpeg`;
                    
                    const el = document.createElement("img");
                    el.src = src;
                    el.className = "card";
                    el.onclick = () => {
                        lbImg.src = src;
                        lbText.innerText = text;
                        lightbox.classList.add("active");
                    };
                    gallery.appendChild(el);
                });
            });
        } catch(e) { console.error("Error cargando feed", e); }
    }

    closeBtn.onclick = () => lightbox.classList.remove("active");
    lightbox.onclick = (e) => { if(e.target === lightbox) lightbox.classList.remove("active"); };
</script>

</body>
</html>
