<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galesky</title>

<style>
:root{
--bg:#000;
--text:#fff;
--dim:#aaa;
--line:#222;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:system-ui;
}

/* buscador */
.search{
max-width:900px;
margin:20px auto;
display:flex;
padding:0 20px;
}

.search input{
flex:1;
padding:14px;
background:#111;
border:1px solid #333;
color:#fff;
border-radius:30px 0 0 30px;
}

.search button{
padding:0 25px;
border:none;
background:#fff;
border-radius:0 30px 30px 0;
cursor:pointer;
}

/* perfil */
.profile{
max-width:900px;
margin:auto;
padding:20px;
display:flex;
gap:20px;
border-bottom:1px solid var(--line);
align-items:center;
}

.profile img{
width:80px;
height:80px;
border-radius:50%;
}

.profile-info{flex:1;}

.profile-info h2{
margin:0;
font-size:22px;
}

.profile-info p{
margin:6px 0;
color:var(--dim);
}

.profile-info span{
font-size:14px;
color:var(--dim);
}

.btn-view{
background:#111;
border:1px solid #444;
color:#fff;
padding:8px 18px;
border-radius:20px;
text-decoration:none;
font-size:14px;
}

/* grid */
.grid{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
padding:6px;
}

.card{
aspect-ratio:1/1;
overflow:hidden;
border-radius:10px;
background:#111;
cursor:pointer;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* modal */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

.modal.active{display:flex;}

.modal-box{
width:100%;
max-width:1100px;
height:90vh;
background:#111;
display:flex;
border-radius:12px;
overflow:hidden;
position:relative;
}

/* cerrar */
.close{
position:absolute;
top:10px;
right:15px;
font-size:28px;
cursor:pointer;
z-index:20;
}

/* imagen */
.modal-img{
flex:1.5;
background:#000;
display:flex;
justify-content:center;
align-items:center;
}

.modal-img img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* info */
.modal-info{
flex:1;
padding:25px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.btn-post{
display:inline-block;
padding:8px 14px;
border:1px solid #444;
border-radius:20px;
color:#fff;
text-decoration:none;
font-size:14px;
width:max-content;
}

/* nav */
.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,.6);
border:none;
color:#fff;
width:42px;
height:42px;
border-radius:50%;
cursor:pointer;
z-index:15;
}

.prev{left:10px;}
.next{right:10px;}

/* móvil */
@media(max-width:768px){

.modal{padding:10px;}

.modal-box{
flex-direction:column;
height:95vh;
}

.modal-img{
width:100%;
aspect-ratio:1/1;
flex:none;
}

.modal-info{
padding:15px;
}

.nav{
top:45%;
}

.prev{left:5px;}
.next{right:5px;}

}
</style>
</head>

<body>

<div class="search">
<input id="userInput" placeholder="usuario">
<button id="goBtn">Buscar</button>
</div>

<div id="profile"></div>
<div id="gallery" class="grid"></div>

<div id="modal" class="modal">
<div class="modal-box">

<div class="close" id="closeBtn">✕</div>

<button class="nav prev" id="prev">❮</button>
<button class="nav next" id="next">❯</button>

<div class="modal-img">
<img id="mImg">
</div>

<div class="modal-info">
<a id="postLink" class="btn-post" target="_blank">Ver publicación</a>
<div id="mText"></div>
<div id="mLikes"></div>
</div>

</div>
</div>

<script>
let images=[];
let index=0;

const input=document.getElementById("userInput");
const btn=document.getElementById("goBtn");
const gallery=document.getElementById("gallery");
const modal=document.getElementById("modal");

input.addEventListener("keypress",e=>{if(e.key==="Enter")btn.click();});
btn.onclick=()=>{const u=input.value.trim().replace("@","");if(u)load(u);};

modal.onclick=e=>{if(e.target===modal)modal.classList.remove("active");};
document.getElementById("closeBtn").onclick=()=>modal.classList.remove("active");

async function load(user){

const didRes=await fetch(`https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${user}`);
const {did}=await didRes.json();

const profRes=await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${did}`);
const prof=await profRes.json();

const feedRes=await fetch(`https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${did}&limit=100`);
const data=await feedRes.json();

images=[];

data.feed.forEach(item=>{
const post=item.post;

let imgs=[];
if(post.embed?.images) imgs.push(...post.embed.images);
if(post.embed?.media?.images) imgs.push(...post.embed.media.images);
if(post.record?.embed?.images) imgs.push(...post.record.embed.images);
if(post.record?.embed?.media?.images) imgs.push(...post.record.embed.media.images);

imgs.forEach(img=>{
const cid=img.image?.ref?.$link||img.image?.$link;
if(!cid) return;

images.push({
thumb:`https://cdn.bsky.app/img/feed_thumbnail/plain/${did}/${cid}@jpeg`,
full:`https://cdn.bsky.app/img/feed_fullsize/plain/${did}/${cid}@jpeg`,
text:post.record?.text||"",
likes:post.likeCount||0,
uri: post.uri
});
});
});

/* perfil */
document.getElementById("profile").innerHTML=`
<div class="profile">
<img src="${prof.avatar||''}">
<div class="profile-info">
<h2>${prof.displayName||user}</h2>
<p>${prof.description||""}</p>
<span>${images.length} imágenes</span>
</div>
<a href="https://bsky.app/profile/${user}" target="_blank" class="btn-view">Ver perfil</a>
</div>
`;

/* grid */
gallery.innerHTML="";
images.forEach((img,i)=>{
const d=document.createElement("div");
d.className="card";
d.innerHTML=`<img src="${img.thumb}">`;
d.onclick=()=>open(i);
gallery.appendChild(d);
});
}

function open(i){
index=i;
const d=images[i];

document.getElementById("mImg").src=d.full;
document.getElementById("mText").innerText=d.text;
document.getElementById("mLikes").innerText=`❤️ ${d.likes}`;

/* URL REAL */
const parts = d.uri.split('/');
const postId = parts[parts.length - 1];
document.getElementById("postLink").href=`https://bsky.app/profile/${input.value}/post/${postId}`;

modal.classList.add("active");
}

document.getElementById("next").onclick=e=>{
e.stopPropagation();
if(index<images.length-1)open(index+1);
};

document.getElementById("prev").onclick=e=>{
e.stopPropagation();
if(index>0)open(index-1);
};

load("iasuarezv.com");
</script>

</body>
</html>
