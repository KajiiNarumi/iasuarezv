<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galesky | AntuanSV</title>
    <style>
        :root {
            --bg: #000;
            --accent: #1da1f2;
            --text-main: #fff;
            --text-dim: #aaa;
            --line: rgba(255, 255, 255, 0.15); /* Línea casi blanca estética */
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* BUSCADOR */
        .search-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
            display: flex;
        }
        .search-container input {
            flex: 1; padding: 12px 20px; background: #111; border: 1px solid #333;
            color: #fff; border-radius: 25px 0 0 25px; outline: none;
        }
        .search-container button {
            padding: 0 25px; border: none; background: #fff;
            border-radius: 0 25px 25px 0; cursor: pointer; font-weight: bold;
        }

        /* PERFIL SIN CUADRO GRIS */
        .profile {
            max-width: 900px;
            margin: 0 auto 20px auto;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid var(--line); /* Línea delgada estética */
        }
        .profile img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; }
        .profile-info { flex: 1; }
        .profile-info h2 { margin: 0; font-size: 20px; }
        .profile-info p { color: var(--text-dim); margin: 5px 0; font-size: 14px; }
        
        .btn-follow {
            background: var(--accent); color: #fff; padding: 6px 15px;
            border-radius: 20px; text-decoration: none; font-size: 13px; font-weight: bold;
        }

        /* GRID */
        .grid {
            max-width: 1000px; margin: auto;
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 2px; padding: 2px;
        }
        .card { aspect-ratio: 1/1; overflow: hidden; background: #111; cursor: pointer; }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* MODAL / LIGHTBOX (No cubre toda la pantalla) */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 10000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .modal-window {
            background: #111; border-radius: 12px; overflow: hidden;
            width: 95%; max-width: 900px; max-height: 90vh;
            display: flex; flex-direction: row; position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* NAVEGACIÓN DENTRO DEL MODAL */
        .btn-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10;
        }
        .btn-prev { left: 10px; }
        .btn-next { right: 10px; }
        .btn-close { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; z-index: 11; }

        /* PC: Imagen Izquierda, Texto Derecha */
        .modal-img-container {
            flex: 1.5; background: #000; display: flex; align-items: center; justify-content: center;
        }
        .modal-img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .modal-info {
            flex: 1; padding: 25px; display: flex; flex-direction: column; overflow-y: auto;
        }
        .modal-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .modal-text { font-size: 16px; line-height: 1.5; color: #ddd; }

        /* MÓVIL: Imagen Arriba, Texto Abajo */
        @media (max-width: 768px) {
            .modal-window { flex-direction: column; width: 90%; }
            
            /* Contenedor 1:1 en la parte superior */
            .modal-img-container {
                width: 100%; aspect-ratio: 1/1; flex: none;
            }
            .modal-info { flex: 1; padding: 15px; }
            .btn-nav { top: 45%; }
        }
    </style>
</head>
<body>

<div class="search-container">
    <input id="userInput" placeholder="iasuarezv.com">
    <button id="goBtn">Buscar</button>
</div>

<div id="profile"></div>
<div id="gallery" class="grid"></div>

<div id="modal" class="modal-overlay">
    <div class="modal-window">
        <button class="btn-close" id="closeBtn">✕</button>
        <button class="btn-nav btn-prev" id="prevBtn">❮</button>
        <button class="btn-nav btn-next" id="nextBtn">❯</button>

        <div class="modal-img-container">
            <img id="modalImg">
        </div>

        <div class="modal-info">
            <div class="modal-meta">
                <div id="modalLikes" style="font-weight: bold; color: var(--accent);"></div>
                <a id="bskyLink" href="#" target="_blank" style="color: #666; text-decoration: none; font-size: 12px;">Ver post original</a>
            </div>
            <div id="modalText" class="modal-text"></div>
        </div>
    </div>
</div>

<script>
const DEFAULT_USER = "iasuarezv.com";
let allImages = [];
let currentIndex = 0;

const input = document.getElementById("userInput");
const goBtn = document.getElementById("goBtn");
const modal = document.getElementById("modal");

// BUSCAR AL DAR ENTER
input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") goBtn.click();
});

goBtn.onclick = () => {
    const user = input.value.trim().replace("@","");
    if(user) load(user);
};

async function load(handle) {
    try {
        const didRes = await fetch(`https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${handle}`);
        const { did } = await didRes.json();
        
        const profRes = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${did}`);
        const prof = await profRes.json();

        const feedRes = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${did}&limit=100`);
        const data = await feedRes.json();

        allImages = [];
        data.feed.forEach(item => {
            const post = item.post;
            const rkey = post.uri.split('/').pop();
            const imgs = post.embed?.images || post.embed?.media?.images || post.record?.embed?.images || [];
            
            imgs.forEach(img => {
                const cid = img.image?.ref?.$link || img.image?.$link;
                allImages.push({
                    thumb: `https://cdn.bsky.app/img/feed_thumbnail/plain/${did}/${cid}@jpeg`,
                    full: `https://cdn.bsky.app/img/feed_fullsize/plain/${did}/${cid}@jpeg`,
                    text: post.record?.text || "",
                    likes: post.likeCount || 0,
                    link: `https://bsky.app/profile/${handle}/post/${rkey}`
                });
            });
        });

        document.getElementById("profile").innerHTML = `
            <div class="profile">
                <img src="${prof.avatar || ''}">
                <div class="profile-info">
                    <h2>${prof.displayName || handle}</h2>
                    <p>${prof.description || ""}</p>
                </div>
                <a href="https://bsky.app/profile/${handle}" target="_blank" class="btn-follow">Seguir</a>
            </div>
        `;

        renderGallery();
    } catch (e) { console.error(e); }
}

function renderGallery() {
    const gal = document.getElementById("gallery");
    gal.innerHTML = "";
    allImages.forEach((img, i) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<img src="${img.thumb}" loading="lazy">`;
        card.onclick = () => openModal(i);
        gal.appendChild(card);
    });
}

function openModal(i) {
    if (i < 0 || i >= allImages.length) return;
    currentIndex = i;
    const data = allImages[i];
    document.getElementById("modalImg").src = data.full;
    document.getElementById("modalText").innerText = data.text;
    document.getElementById("modalLikes").innerText = `❤️ ${data.likes}`;
    document.getElementById("bskyLink").href = data.link;
    modal.classList.add("active");
    document.body.style.overflow = "hidden";
}

document.getElementById("closeBtn").onclick = () => {
    modal.classList.remove("active");
    document.body.style.overflow = "auto";
};

document.getElementById("nextBtn").onclick = () => openModal(currentIndex + 1);
document.getElementById("prevBtn").onclick = () => openModal(currentIndex - 1);

// Cargar por defecto
load(DEFAULT_USER);
</script>
</body>
</html>
