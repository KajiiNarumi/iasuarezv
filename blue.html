<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galesky</title>
    <style>
        :root {
            --bg: #000;
            --accent: #1da1f2;
            --text-main: #fff;
            --text-dim: #aaa;
            --card-bg: #111;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* HEADER */
        .header { padding: 20px 16px; border-bottom: 1px solid #222; }
        .search { display: flex; max-width: 600px; margin: 0 auto 20px auto; }
        .search input {
            flex: 1; padding: 14px; background: #111; border: 2px solid #333;
            color: #fff; border-radius: 30px 0 0 30px; outline: none;
        }
        .search button {
            padding: 0 25px; border: none; background: #fff;
            border-radius: 0 30px 30px 0; cursor: pointer; font-weight: bold;
        }

        .profile { max-width: 900px; margin: auto; display: flex; gap: 16px; align-items: center; }
        .profile img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        .profile-info h2 { margin: 0; font-size: 18px; }
        .img-count { color: var(--accent); font-size: 12px; font-weight: bold; }

        /* GRID */
        .grid {
            max-width: 1200px; margin: auto; display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 4px; padding: 4px;
        }
        .card { aspect-ratio: 1/1; overflow: hidden; position: relative; cursor: pointer; background: #111; }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* LIGHTBOX RE-ESTRUCTURADO */
        .lightbox {
            position: fixed; inset: 0; background: #000;
            display: none; flex-direction: column; z-index: 2000;
        }
        .lightbox.active { display: flex; }

        /* BARRA SUPERIOR LIGHTBOX */
        .lb-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: rgba(0,0,0,0.8); z-index: 2010;
        }
        .close-btn { font-size: 30px; cursor: pointer; }
        .bsky-link {
            color: var(--accent); text-decoration: none; font-size: 14px;
            border: 1px solid var(--accent); padding: 5px 12px; border-radius: 15px;
        }

        .lb-main { flex: 1; display: flex; overflow: hidden; position: relative; }

        /* ÁREA DE IMAGEN */
        .lb-img-container {
            flex: 2; display: flex; align-items: center; justify-content: center;
            background: #000; position: relative;
        }
        .lb-img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* ÁREA DE TEXTO */
        .lb-info {
            flex: 1; background: #111; padding: 25px; display: flex;
            flex-direction: column; border-left: 1px solid #222; overflow-y: auto;
        }
        .lb-text { font-size: 16px; line-height: 1.5; margin-bottom: 20px; }
        .lb-stats { color: var(--accent); font-weight: bold; margin-top: auto; }

        /* BOTONES DE NAVEGACIÓN */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            padding: 20px 15px; cursor: pointer; font-size: 24px; border-radius: 5px;
        }
        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }

        /* RESPONSIVE MÓVIL */
        @media (max-width: 768px) {
            .lb-main { flex-direction: column; }
            .lb-img-container { flex: 0 0 60vh; } /* Imagen ocupa el 60% del alto */
            .lb-info { flex: 1; border-left: none; border-top: 1px solid #222; padding: 15px; }
            .nav-btn { padding: 10px; background: rgba(0,0,0,0.4); top: 30vh; }
            .grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="search">
        <input id="userInput" placeholder="usuario.bsky.social">
        <button id="goBtn">Buscar</button>
    </div>
    <div id="profile" class="profile"></div>
</div>

<div id="gallery" class="grid"></div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
    <div class="lb-header">
        <a id="bskyLink" class="bsky-link" target="_blank">Ver en Bluesky</a>
        <div class="close-btn" id="closeBtn">✕</div>
    </div>
    
    <div class="lb-main">
        <button class="nav-btn prev-btn" id="prevBtn">❮</button>
        <div class="lb-img-container">
            <img id="lbImg">
        </div>
        <button class="nav-btn next-btn" id="nextBtn">❯</button>

        <div class="lb-info">
            <div id="lbText" class="lb-text"></div>
            <div id="lbStats" class="lb-stats"></div>
        </div>
    </div>
</div>

<script>
const DEFAULT_USER = "iasuarezv.com";
let allImages = [];
let currentIndex = 0;

const input = document.getElementById("userInput");
const btn = document.getElementById("goBtn");
const gallery = document.getElementById("gallery");
const profile = document.getElementById("profile");
const lightbox = document.getElementById("lightbox");
const lbImg = document.getElementById("lbImg");
const lbText = document.getElementById("lbText");
const lbStats = document.getElementById("lbStats");
const bskyLink = document.getElementById("bskyLink");

// Carga inicial
const saved = localStorage.getItem("user") || DEFAULT_USER;
input.value = saved;
load(saved);

btn.onclick = () => {
    const user = input.value.trim().replace("@","");
    if(user) {
        localStorage.setItem("user", user);
        load(user);
    }
};

async function load(handle) {
    try {
        gallery.innerHTML = "<p style='padding:20px'>Cargando...</p>";
        allImages = [];

        const didRes = await fetch(`https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${handle}`);
        const { did } = await didRes.json();
        
        const profRes = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=${did}`);
        const prof = await profRes.json();

        const feedRes = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${did}&limit=100`);
        const data = await feedRes.json();

        data.feed.forEach(item => {
            const post = item.post;
            const text = post.record?.text || "";
            const likes = post.likeCount || 0;
            const rkey = post.uri.split('/').pop();
            const link = `https://bsky.app/profile/${handle}/post/${rkey}`;

            let imgs = [];
            // Recolección exhaustiva de imágenes (Formatos de post y quote posts)
            if (post.embed?.images) imgs.push(...post.embed.images);
            if (post.embed?.media?.images) imgs.push(...post.embed.media.images);
            if (post.record?.embed?.images) imgs.push(...post.record.embed.images);
            if (post.embed?.record?.embed?.images) imgs.push(...post.embed.record.embed.images);

            imgs.forEach(img => {
                const cid = img.image?.ref?.$link || img.image?.$link;
                if (cid) {
                    allImages.push({
                        thumb: `https://cdn.bsky.app/img/feed_thumbnail/plain/${did}/${cid}@jpeg`,
                        full: `https://cdn.bsky.app/img/feed_fullsize/plain/${did}/${cid}@jpeg`,
                        text, likes, link
                    });
                }
            });
        });

        profile.innerHTML = `
            <img src="${prof.avatar || ''}">
            <div class="profile-info">
                <h2>${prof.displayName || handle}</h2>
                <div class="img-count">📸 ${allImages.length} imágenes</div>
            </div>
        `;

        renderGallery();
    } catch (e) {
        gallery.innerHTML = "<p style='padding:20px'>Usuario no encontrado o error de API.</p>";
    }
}

function renderGallery() {
    gallery.innerHTML = "";
    allImages.forEach((img, i) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<img src="${img.thumb}" loading="lazy">`;
        card.onclick = () => openLightbox(i);
        gallery.appendChild(card);
    });
}

function openLightbox(i) {
    if (i < 0 || i >= allImages.length) return;
    currentIndex = i;
    const data = allImages[i];
    lbImg.src = data.full;
    lbText.innerText = data.text;
    lbStats.innerText = `❤️ ${data.likes}`;
    bskyLink.href = data.link;
    lightbox.classList.add("active");
    document.body.style.overflow = "hidden";
}

document.getElementById("closeBtn").onclick = () => {
    lightbox.classList.remove("active");
    document.body.style.overflow = "auto";
};

document.getElementById("nextBtn").onclick = (e) => { e.stopPropagation(); openLightbox(currentIndex + 1); };
document.getElementById("prevBtn").onclick = (e) => { e.stopPropagation(); openLightbox(currentIndex - 1); };

// Teclado
document.addEventListener("keydown", e => {
    if (!lightbox.classList.contains("active")) return;
    if (e.key === "ArrowRight") openLightbox(currentIndex + 1);
    if (e.key === "ArrowLeft") openLightbox(currentIndex - 1);
    if (e.key === "Escape") document.getElementById("closeBtn").onclick();
});

</script>
</body>
</html>
