<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ATProto Viewer</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: system-ui, sans-serif;
}

header {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #222;
}

input {
  padding: 8px;
  background: #111;
  border: 1px solid #333;
  color: #fff;
  width: 250px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 6px;
  padding: 10px;
}

.card {
  background: #111;
  overflow: hidden;
  border-radius: 6px;
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  display: block;
}
</style>
</head>

<body>

<header>
  <input id="userInput" placeholder="usuario (ej: iasuarezv.com)">
</header>

<div class="grid" id="gallery"></div>

<script>
const input = document.getElementById("userInput");
const gallery = document.getElementById("gallery");

// cargar último usuario
const savedUser = localStorage.getItem("atproto_user");
if (savedUser) {
  input.value = savedUser;
  load(savedUser);
}

// enter para cargar
input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const user = input.value.trim();
    if (!user) return;

    localStorage.setItem("atproto_user", user);
    gallery.innerHTML = "";
    load(user);
  }
});

async function load(handle) {
  try {
    const didRes = await fetch(`https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${handle}`);
    const { did } = await didRes.json();

    if (!did) {
      alert("Usuario no válido");
      return;
    }

    let cursor = "";
    let rounds = 3;

    for (let i = 0; i < rounds; i++) {
      const url = new URL("https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed");
      url.searchParams.set("actor", did);
      url.searchParams.set("limit", 50);
      if (cursor) url.searchParams.set("cursor", cursor);

      const res = await fetch(url);
      const data = await res.json();

      data.feed.forEach(item => {
        const post = item.post;

        let images = [];

        if (post.embed?.images) images = post.embed.images;
        if (post.embed?.media?.images) images = post.embed.media.images;
        if (post.record?.embed?.images) images = post.record.embed.images;

        images.forEach(img => {
          // construir URL correcta
          const cid = img.image.ref.$link;
          const src = `https://cdn.bsky.app/img/feed_fullsize/plain/${did}/${cid}@jpeg`;

          const card = document.createElement("div");
          card.className = "card";

          const image = document.createElement("img");
          image.src = src;

          card.appendChild(image);
          gallery.appendChild(card);
        });
      });

      if (!data.cursor) break;
      cursor = data.cursor;
    }

  } catch (e) {
    console.error(e);
  }
}
</script>

</body>
</html>
