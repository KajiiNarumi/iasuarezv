<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Debug ATProto</title>
<style>
body { background:#000; color:#0f0; font-family:monospace; }
img { width:150px; height:150px; object-fit:cover; }
</style>
</head>
<body>

<div id="log"></div>
<div id="gallery"></div>

<script>
const handle = "iasuarezv.com";
const log = (msg) => document.getElementById("log").innerHTML += msg + "<br>";
const gallery = document.getElementById("gallery");

async function run() {
  try {
    log("Resolviendo DID...");

    const didRes = await fetch(`https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${handle}`);
    const didData = await didRes.json();

    if (!didData.did) {
      log("ERROR: no DID");
      return;
    }

    log("DID: " + didData.did);

    const feedRes = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${didData.did}&limit=50`);
    const feedData = await feedRes.json();

    if (!feedData.feed) {
      log("ERROR: feed vacío");
      return;
    }

    log("Posts recibidos: " + feedData.feed.length);

    let count = 0;

    feedData.feed.forEach(item => {
      const post = item.post;

      // intenta varias rutas posibles
      let embeds = [];

      if (post.embed?.images) embeds = post.embed.images;
      if (post.embed?.media?.images) embeds = post.embed.media.images;
      if (post.record?.embed?.images) embeds = post.record.embed.images;

      embeds.forEach(img => {
        const el = document.createElement("img");
        el.src = img.thumb || img.fullsize;
        gallery.appendChild(el);
        count++;
      });
    });

    log("Imágenes encontradas: " + count);

    if (count === 0) {
      log("No hay imágenes en estos posts (o no vienen en embed estándar)");
    }

  } catch (e) {
    log("ERROR: " + e.message);
    console.error(e);
  }
}

run();
</script>

</body>
</html>
