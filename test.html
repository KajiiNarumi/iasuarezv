<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dualidad</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  overflow:hidden;
  transition:0.5s;
}

/* SPLIT */
.split{
  position:absolute;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transition:0.6s;
}

.left{
  background:#fff;
  color:#000;
  font-family:'Playfair Display', serif;
}

.right{
  background:#000;
  color:#fff;
  font-family:'Inter', sans-serif;
}

h1{
  font-size:clamp(1.8rem,3vw,2.4rem);
  margin:0 0 20px;
}

/* CONTENIDO */
.content{
  opacity:0;
  transition:0.4s;
  text-align:center;
  font-size:0.9rem;
}

body.light .left .content,
body.dark .right .content{
  opacity:1;
}

/* DESKTOP */
.split{
  width:50%;
  height:100%;
  top:0;
}

.left{ left:0;}
.right{ right:0;}

body.light .right{ width:0;}
body.light .left{ width:100%;}

body.dark .left{ width:0;}
body.dark .right{ width:100%;}

/* MOBILE */
@media(max-width:768px){

  .split{
    width:100%;
    height:50%;
  }

  .left{ top:0;}
  .right{ top:50%;}

  body.light .split,
  body.dark .split{
    height:100%;
    top:0;
  }
}

/* TOGGLE */
.toggle{
  position:absolute;
  width:52px;
  height:52px;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  overflow:hidden;
  z-index:10;
  transition:0.6s;
}

.half{
  width:50%;
  height:100%;
  cursor:pointer;
}

/* COLORES DINÁMICOS */
body.light .white{ background:#000;}
body.light .black{ background:#fff;}

body.dark .white{ background:#fff;}
body.dark .black{ background:#000;}

/* POSICIÓN + GIRO */
body.light .toggle{
  left:8%;
  transform:translate(-50%,-50%) rotate(180deg);
}

body.dark .toggle{
  left:92%;
  transform:translate(-50%,-50%) rotate(0deg);
}

/* FOOTER */
footer{
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  font-size:0.8rem;
  padding:10px;
}

footer a{
  color:inherit;
  text-decoration:none;
}

footer::before{
  content:"";
  display:block;
  height:1px;
  margin-bottom:8px;
}

body.light footer{ color:#000;}
body.dark footer{ color:#fff;}

body.light footer::before{ background:#000;}
body.dark footer::before{ background:#fff;}
body:not(.light):not(.dark) footer::before{ background:#888;}

</style>
</head>

<body>

<!-- LADO BLANCO -->
<div class="split left" onclick="setMode('light')">
  <h1>AntuanSV</h1>
  <div class="content">
    Mi contenido XXX<br><br>
    Fansly - VIP<br>
    Stripchat - Live<br><br>
    Solo<br>
    xHamster - Triler<br>
    FapHouse - Video Full
  </div>
</div>

<!-- LADO NEGRO -->
<div class="split right" onclick="setMode('dark')">
  <h1>I. Antoine Suárez V.</h1>
  <div class="content">
    Escritor · Fotógrafo · Aforista
  </div>
</div>

<!-- BOTÓN -->
<div class="toggle">
  <div class="half white" onclick="toggleMode('white', event)"></div>
  <div class="half black" onclick="toggleMode('black', event)"></div>
</div>

<footer>
<a href="https://iasuarezv.carrd.co">Enlaces a redes sociales</a> |
<a href="https://iasuarezv.com/atom.xml">Feed RSS</a><br>
© 2026 I. Antoine Suárez V.
</footer>

<script>
function setMode(mode){
  document.body.className=mode;
}

/* lógica correcta del botón */
function toggleMode(side,e){
  e.stopPropagation();

  if(document.body.classList.contains('light')){
    if(side==='black') setMode('dark');
  }else if(document.body.classList.contains('dark')){
    if(side==='white') setMode('light');
  }else{
    /* estado inicial */
    if(side==='white') setMode('light');
    if(side==='black') setMode('dark');
  }
}
</script>

</body>
</html>
