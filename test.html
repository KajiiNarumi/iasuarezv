<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dualidad</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
}

/* BASE */
.split {
  position: absolute;
  width: 50%;
  height: 100%;
  top: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.6s ease;
}

.left {
  left: 0;
  background: #fff;
  color: #000;
  font-family: 'DM Serif Display', serif;
}

.right {
  right: 0;
  background: #000;
  color: #fff;
  font-family: 'IBM Plex Mono', monospace;
}

h1 {
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  text-align: center;
  padding: 20px;
  pointer-events: none;
}

/* ESTADO INICIAL */
body.start .left { width: 50%; }
body.start .right { width: 50%; }

/* ESTADOS */
body.light .left { width: 100%; }
body.light .right { width: 0; }

body.dark .right { width: 100%; }
body.dark .left { width: 0; }

/* CÍRCULO */
.toggle {
  position: absolute;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  overflow: hidden;
  z-index: 10;
  transition: all 0.6s ease;
}

/* POSICIÓN */
body.start .toggle {
  left: 50%;
}

body.light .toggle {
  left: 8%;
  transform: translate(-50%, -50%) rotate(180deg);
}

body.dark .toggle {
  left: 92%;
  transform: translate(-50%, -50%) rotate(0deg);
}

.half {
  width: 50%;
  height: 100%;
}

/* CONTRASTE */
body.light .white { background: #000; }
body.light .black { background: #fff; }

body.dark .white { background: #fff; }
body.dark .black { background: #000; }

/* MOBILE (sin romper layout) */
@media (max-width: 768px) {

  h1 {
    font-size: clamp(1.2rem, 5vw, 1.6rem);
  }

  .toggle {
    width: 42px;
    height: 42px;
  }

  body.light .toggle {
    left: 12%;
  }

  body.dark .toggle {
    left: 88%;
  }
}

</style>
</head>

<body class="start">

<div class="split left" onclick="setMode('light')">
  <h1>AntuanSV</h1>
</div>

<div class="split right" onclick="setMode('dark')">
  <h1>I. Antoine Suárez V.</h1>
</div>

<div class="toggle" onclick="handleToggle(event)">
  <div class="half white"></div>
  <div class="half black"></div>
</div>

<script>
function setMode(mode) {
  document.body.classList.remove('start','light','dark');
  document.body.classList.add(mode);
}

function handleToggle(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const clickX = e.clientX - rect.left;

  if (clickX < rect.width / 2) {
    setMode('light');
  } else {
    setMode('dark');
  }
}

/* FORZAR estado inicial SIEMPRE */
window.addEventListener('load', () => {
  document.body.className = 'start';
});
</script>

</body>
</html>
