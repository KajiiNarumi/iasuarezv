<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dualidad</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
}

/* SPLIT BASE */
.split {
  position: absolute;
  width: 50%;
  height: 100%;
  top: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: all 0.6s ease;
}

.left {
  left: 0;
  background: #fff;
  color: #000;
  font-family: 'DM Serif Display', serif;
}

.right {
  right: 0;
  background: #000;
  color: #fff;
  font-family: 'IBM Plex Mono', monospace;
}

h1 {
  font-size: clamp(1.8rem, 3vw, 2.4rem);
  margin-bottom: 20px;
}

/* 🔥 CONTENIDO OCULTO */
.content {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

/* mostrar contenido solo activo */
body.light .left .content,
body.dark .right .content {
  opacity: 1;
  pointer-events: auto;
}

/* DESKTOP */
body.light .right { width: 0; }
body.light .left { width: 100%; }

body.dark .left { width: 0; }
body.dark .right { width: 100%; }

/* TOGGLE */
.toggle {
  position: absolute;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  overflow: hidden;
  z-index: 20;
  transition: all 0.6s ease;
}

/* SIEMPRE LATERAL */
body.light .toggle {
  left: 8%;
  transform: translate(-50%, -50%) rotate(180deg);
}

body.dark .toggle {
  left: 92%;
  transform: translate(-50%, -50%);
}

.half {
  width: 50%;
  height: 100%;
  cursor: pointer;
}

/* contraste */
body.light .white { background: #000; }
body.light .black { background: #fff; }

body.dark .white { background: #fff; }
body.dark .black { background: #000; }

/* MOBILE */
@media (max-width: 768px) {

  /* inicio vertical */
  body:not(.light):not(.dark) .split {
    width: 100%;
    height: 50%;
  }

  body:not(.light):not(.dark) .left { top: 0; }
  body:not(.light):not(.dark) .right { top: 50%; }

  /* después horizontal normal */
  body.light .split,
  body.dark .split {
    width: 100%;
    height: 100%;
    top: 0;
  }

  h1 {
    font-size: clamp(1.4rem, 6vw, 2rem);
  }
}

</style>
</head>

<body>

<!-- LADO BLANCO -->
<div class="split left" onclick="setMode('light')">
  <h1>AntuanSV</h1>

  <div class="content">
    <strong>Mi contenido XXX</strong><br><br>

    Fansly - VIP<br>
    Stripchat - Live<br><br>

    <strong>Solo</strong><br>
    xHamster - Triler<br>
    FapHouse - Video Full<br><br>

    <strong>Colaboraciones</strong><br>
    xHamster - Triler<br>
    FapHouse - Video Full<br><br>

    <strong>¿Quieres ser creador?</strong><br>
    OnlyFans<br>
    Fansly<br>
    Stripchat<br>
    xHamster<br>
    FlapHouse
  </div>
</div>

<!-- LADO NEGRO -->
<div class="split right" onclick="setMode('dark')">
  <h1>I. Antoine Suárez V.</h1>

  <div class="content">
    Escritor · Fotógrafo · Aforista
  </div>
</div>

<!-- BOTÓN -->
<div class="toggle">
  <div class="half white" onclick="setMode('light'); event.stopPropagation();"></div>
  <div class="half black" onclick="setMode('dark'); event.stopPropagation();"></div>
</div>

<script>
function setMode(mode) {
  document.body.classList.remove('light','dark');
  document.body.classList.add(mode);
}
</script>

</body>
</html>
