<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dualidad</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@400&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  height:100%;
  overflow:hidden;
}

/* SPLIT BASE */
.split{
  position:absolute;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  transition:0.6s;
  width:50%;
  height:100vh;
  top:0;
  cursor:pointer;
}

.left{
  left:0;
  background:#fff;
  color:#000;
  font-family:'Playfair Display', serif;
}

.right{
  right:0;
  background:#000;
  color:#fff;
  font-family:'Inter', sans-serif;
}

h1{
  font-size:clamp(2rem,3vw,2.5rem);
  margin:0;
  transition:0.4s;
}

/* mover título cuando hay contenido */
body.light .left h1,
body.dark .right h1{
  transform:translateY(-80px);
}

/* CONTENIDO */
.content{
  position:absolute;
  top:60%;
  left:50%;
  transform:translate(-50%, -50%);
  opacity:0;
  transition:0.4s;
  font-size:0.9rem;
  pointer-events:none;
}

body.light .left .content,
body.dark .right .content{
  opacity:1;
  pointer-events:auto;
}

/* ESTADOS */
body.light .left{ width:100%;}
body.light .right{ width:0;}

body.dark .right{ width:100%;}
body.dark .left{ width:0;}

/* MOBILE */
@media(max-width:768px){

  .split{
    width:100%;
    height:50%;
  }

  .left{ top:0;}
  .right{ top:50%;}

  body.light .split,
  body.dark .split{
    height:100%;
    top:0;
  }
}

/* BOTÓN ORIGINAL RESTAURADO */
.toggle{
  position:absolute;
  width:50px;
  height:50px;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  overflow:hidden;
  z-index:10;
  transition:0.5s;
  opacity:0;
}

/* aparece solo cuando eliges */
body.light .toggle,
body.dark .toggle{
  opacity:1;
}

.half{
  width:50%;
  height:100%;
}

/* colores base */
.white{ background:#fff;}
.black{ background:#000;}

/* contraste dinámico */
body.light .white{ background:#000;}
body.light .black{ background:#fff;}

body.dark .white{ background:#fff;}
body.dark .black{ background:#000;}

/* posición y giro bonito */
body.light .toggle{
  left:8%;
  transform:translate(-50%,-50%) rotate(180deg);
}

body.dark .toggle{
  left:92%;
  transform:translate(-50%,-50%);
}

/* FOOTER */
footer{
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  font-size:0.8rem;
  padding:10px;
  opacity:0;
  transition:0.3s;
}

body.light footer,
body.dark footer{
  opacity:1;
}

footer a{
  color:inherit;
  text-decoration:none;
}

footer::before{
  content:"";
  display:block;
  height:1px;
  margin-bottom:8px;
}

body.light footer{ color:#000;}
body.dark footer{ color:#fff;}

body.light footer::before{ background:#000;}
body.dark footer::before{ background:#fff;}





  

</style>
</head>

<body>

<!-- BLANCO -->
<div class="split left" onclick="setMode('light')">
  <h1>AntuanSV</h1>









<!-- NEGRO -->
<div class="split right" onclick="setMode('dark')">
  <h1>I. Antoine Suárez V.</h1>

  <div class="content">
    Escritor · Fotógrafo · Aforista
  </div>
</div>

<!-- BOTÓN BONITO -->
<div class="toggle" onclick="toggleMode()">
  <div class="half white"></div>
  <div class="half black"></div>
</div>

<footer>
<a href="https://iasuarezv.carrd.co">Enlaces a redes sociales</a> |
<a href="https://iasuarezv.com/atom.xml">Feed RSS</a><br>
© 2026 I. Antoine Suárez V.
</footer>

<script>
function setMode(mode){
  document.body.className = mode;
}

function toggleMode(){
  if(document.body.className === "light"){
    setMode("dark");
  }else{
    setMode("light");
  }
}
</script>

</body>
</html>
