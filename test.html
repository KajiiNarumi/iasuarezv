<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dualidad</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
}

/* HEADER / FOOTER */
header, footer {
  position: fixed;
  width: 100%;
  padding: 10px;
  text-align: center;
  z-index: 20;
  transition: all 0.5s ease;
}

header { top: 0; }
footer { bottom: 0; }

/* ocultos al inicio */
body.start header,
body.start footer {
  opacity: 0;
  pointer-events: none;
}

/* LIGHT MODE */
body.light header,
body.light footer {
  background: #000;
  color: #fff;
}

/* DARK MODE */
body.dark header,
body.dark footer {
  background: #fff;
  color: #000;
}

/* SPLIT */
.split {
  position: absolute;
  width: 50%;
  height: 100%;
  top: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.6s ease;
}

.left {
  left: 0;
  background: #fff;
  color: #000;
  font-family: 'DM Serif Display', serif;
}

.right {
  right: 0;
  background: #000;
  color: #fff;
  font-family: 'IBM Plex Mono', monospace;
}

h1 {
  font-size: clamp(1.8rem, 3vw, 2.4rem);
  padding: 20px;
}

/* ESTADOS DESKTOP */
body.start .left,
body.start .right {
  width: 50%;
}

body.light .left { width: 100%; }
body.light .right { width: 0; }

body.dark .right { width: 100%; }
body.dark .left { width: 0; }

/* TOGGLE */
.toggle {
  position: absolute;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  overflow: hidden;
  z-index: 10;
  transition: all 0.6s ease;
}

body.light .toggle {
  left: 8%;
  transform: translate(-50%, -50%) rotate(180deg);
}

body.dark .toggle {
  left: 92%;
  transform: translate(-50%, -50%);
}

.half {
  width: 50%;
  height: 100%;
}

/* CONTRASTE */
body.light .white { background: #000; }
body.light .black { background: #fff; }

body.dark .white { background: #fff; }
body.dark .black { background: #000; }

/* MOBILE INTRO (vertical SOLO en start) */
@media (max-width: 768px) {

  body.start .split {
    width: 100%;
    height: 50%;
  }

  body.start .left {
    top: 0;
  }

  body.start .right {
    top: 50%;
  }

  /* cuando eliges → vuelve a horizontal */
  body.light .split,
  body.dark .split {
    width: 100%;
    height: 100%;
    top: 0;
  }

  h1 {
    font-size: clamp(1.4rem, 6vw, 2rem);
  }
}

</style>
</head>

<body class="start">

<header>Header</header>
<footer>Footer</footer>

<div class="split left" onclick="setMode('light')">
  <h1>AntuanSV</h1>
</div>

<div class="split right" onclick="setMode('dark')">
  <h1>I. Antoine Suárez V.</h1>
</div>

<div class="toggle" onclick="handleToggle(event)">
  <div class="half white"></div>
  <div class="half black"></div>
</div>

<script>
function setMode(mode) {
  document.body.classList.remove('start','light','dark');
  document.body.classList.add(mode);
}

function handleToggle(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const clickX = e.clientX - rect.left;

  if (clickX < rect.width / 2) {
    setMode('light');
  } else {
    setMode('dark');
  }
}

/* siempre iniciar limpio */
window.addEventListener('load', () => {
  document.body.className = 'start';
});
</script>

</body>
</html>
