---
sitemap: false
---

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Alice&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    background-color: #000;
    color: #fff;
    margin: 0;
    padding: 40px;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 650px;
}

h1 {
    font-family: 'Alice', serif;
    font-size: 30px;
    font-weight: normal;
    margin-bottom: 30px;
}

.post {
    margin-bottom: 28px;
    padding-bottom: 18px;
    border-bottom: 1px solid #333;
}

.post-title {
    font-family: 'Alice', serif;
    font-size: 22px;
    margin-bottom: 4px;
}

.post-title a {
    color: #fff;
    text-decoration: none;
}

.post-title a:hover {
    opacity: 0.8;
}

.date {
    font-size: 13px;
    color: #aaa;
}

.kn-readmore-container {
    text-align: center;
    margin-top: 20px;
}

.kn-readmore-btn {
    display: inline-block;
    padding: 10px 22px;
    border: 2px solid #333;
    background: rgba(0,0,0,.4);
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: bold;
    transition: .25s ease;
}

.kn-readmore-btn:hover {
    background: rgba(255,255,255,.05);
    border-color: #555;
    transform: translateY(-2px);
}
</style>
</head>

<body>

<div class="container">

<h1>Últimas publicaciones</h1>

<div id="feed"></div>

<div class="kn-readmore-container">
    <a href="https://blog.kajiinarumi.com/" target="_blank" class="kn-readmore-btn">
        Leer más
    </a>
</div>

</div>

<script>
fetch("https://api.allorigins.win/raw?url=https://blog.kajiinarumi.com/feed.xml")
.then(response => response.text())
.then(str => {
    const parser = new DOMParser();
    const xml = parser.parseFromString(str, "text/xml");

    const items = xml.querySelectorAll("item");
    const container = document.getElementById("feed");

    Array.from(items).slice(0, 3).forEach(item => {

        const title = item.querySelector("title").textContent;
        const link = item.querySelector("link").textContent;
        const date = new Date(
            item.querySelector("pubDate").textContent
        ).toLocaleDateString("es-MX");

        container.innerHTML += `
            <div class="post">
                <div class="post-title">
                    <a href="${link}" target="_blank">
                        ${title}
                    </a>
                </div>

                <div class="date">
                    ${date}
                </div>
            </div>
        `;
    });
})
.catch(error => {
    document.getElementById("feed").innerHTML = `
        <div class="post">
            Error cargando publicaciones.
        </div>
    `;
    console.error(error);
});
</script>

</body>
</html>
